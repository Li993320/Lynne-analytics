<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lynne Analytic</title>
  <style>
    :root {
      --primary: #1a56db;
      --primary-dark: #1e40af;
      --bg: #f8fafc;
      --card: #ffffff;
      --text: #1e293b;
      --text-sub: #64748b;
      --border: #e2e8f0;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    .container {
      text-align: center;
      max-width: 600px;
      padding: 40px 20px;
    }
    .logo {
      font-size: 48px;
      margin-bottom: 16px;
    }
    .title {
      font-size: 32px;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 8px;
    }
    .subtitle {
      font-size: 16px;
      color: var(--text-sub);
      margin-bottom: 48px;
    }
    .cards {
      display: flex;
      gap: 24px;
      justify-content: center;
      flex-wrap: wrap;
    }
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 40px 32px;
      width: 240px;
      cursor: pointer;
      transition: all 0.2s;
      text-decoration: none;
      color: var(--text);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
    }
    .card:hover {
      border-color: var(--primary);
      box-shadow: 0 8px 24px rgba(26, 86, 219, 0.12);
      transform: translateY(-2px);
    }
    .card-icon {
      font-size: 56px;
    }
    .card-title {
      font-size: 20px;
      font-weight: 600;
    }
    .card-desc {
      font-size: 14px;
      color: var(--text-sub);
      line-height: 1.5;
    }
    .card-arrow {
      font-size: 20px;
      color: var(--primary);
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">📊</div>
    <h1 class="title">Lynne Analytic</h1>
    <p class="subtitle">选择你要使用的分析平台</p>
    <div class="cards">
      <a href="ads.html" class="card">
        <span class="card-icon">📈</span>
        <span class="card-title">广告分析</span>
        <span class="card-desc">广告投放趋势 · 渠道管理<br>用户画像 · 宏观洞察</span>
        <span class="card-arrow">→</span>
      </a>
      <a href="finance/index.html" class="card">
        <span class="card-icon">💰</span>
        <span class="card-title">财务分析</span>
        <span class="card-desc">财务总览 · 竞对分析<br>行业对比 · AI 健康评分</span>
        <span class="card-arrow">→</span>
      </a>
      <a href="tax.html" class="card">
        <span class="card-icon">🏛️</span>
        <span class="card-title">各国税务</span>
        <span class="card-desc">全球税务对比 · 各税种分析<br>综合税负估算 · 行业场景</span>
        <span class="card-arrow">→</span>
      </a>
    </div>
  </div>
</body>
</html>

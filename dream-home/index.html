<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>三丽鸥小屋设计游戏 · Sanrio House Design</title>
<link href="https://fonts.googleapis.com/css2?family=ZCOOL+KuaiLe&family=Nunito:wght@600;800&display=swap" rel="stylesheet">
<style>
  :root{
    --pink:#ff8fa3; --pink-dark:#e8677e; --pink-light:#ffd6df;
    --cream:#fff8ee; --mint:#b8e6c9; --mint-dark:#8fd3a8;
    --blue:#a8d8f0; --yellow:#ffe89a; --purple:#d4b8e6;
    --bg:#fff0f4; --panel:#ffffff; --text:#5c4a52; --line:#f0d8df;
    --room-wall:#ffd6df; --room-floor:#fff3e0;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%;font-family:"ZCOOL KuaiLe","Nunito","Microsoft YaHei",sans-serif;color:var(--text);background:var(--bg)}
  body{display:flex;flex-direction:column;overflow:hidden}

  /* 顶栏 */
  .topbar{
    display:flex;align-items:center;gap:14px;padding:10px 18px;
    background:linear-gradient(90deg,#fff 0%,var(--pink-light) 100%);
    border-bottom:2px solid var(--pink-light);box-shadow:0 2px 8px rgba(232,103,126,.12);
    z-index:20
  }
  .logo{width:46px;height:46px;flex-shrink:0}
  .title{font-size:20px;font-weight:700;color:var(--pink-dark);letter-spacing:1px}
  .title small{display:block;font-size:11px;color:#a88;font-weight:400;letter-spacing:0}
  .spacer{flex:1}
  .topbtn{
    border:none;padding:8px 14px;border-radius:999px;cursor:pointer;font-family:inherit;font-size:13px;
    background:var(--pink);color:#fff;box-shadow:0 3px 0 var(--pink-dark);transition:transform .15s;
  }
  .topbtn:active{transform:translateY(3px);box-shadow:none}
  .topbtn.alt{background:#fff;color:var(--pink-dark);box-shadow:0 3px 0 var(--pink-light)}
  .topbtn.alt:active{box-shadow:none}

  /* 主体三栏 */
  .main{flex:1;display:flex;overflow:hidden}

  /* 左侧家具库 */
  .palette{
    width:200px;background:var(--panel);border-right:2px solid var(--line);overflow-y:auto;padding:10px;flex-shrink:0;
  }
  .cat-title{font-size:13px;color:var(--pink-dark);margin:6px 0 6px;padding-bottom:4px;border-bottom:1px dashed var(--line)}
  .cat-title:first-child{margin-top:0}
  .items{display:grid;grid-template-columns:1fr 1fr;gap:8px}
  .item{
    background:var(--cream);border:2px solid var(--line);border-radius:12px;padding:8px 4px;text-align:center;
    cursor:grab;transition:all .2s;user-select:none;
  }
  .item:hover{border-color:var(--pink);transform:translateY(-2px);box-shadow:0 4px 10px rgba(255,143,163,.2)}
  .item:active{cursor:grabbing}
  .item .ic{font-size:26px;line-height:1}
  .item .nm{font-size:11px;color:#888;margin-top:2px}

  /* 中央房间 */
  .stage{flex:1;display:flex;align-items:center;justify-content:center;padding:20px;overflow:auto;position:relative}
  .room{
    position:relative;width:560px;height:420px;background:var(--room-wall);border-radius:14px;
    box-shadow:0 12px 30px rgba(0,0,0,.12),inset 0 0 0 8px rgba(255,255,255,.4);
    overflow:hidden;
  }
  .room-floor{position:absolute;left:8px;top:8px;right:8px;bottom:8px;background:var(--room-floor);border-radius:8px;transition:background .3s}
  .room-floor::before{
    content:"";position:absolute;inset:0;
    background-image:repeating-linear-gradient(0deg,transparent 0,transparent 39px,rgba(180,140,90,.12) 40px),
                     repeating-linear-gradient(90deg,transparent 0,transparent 39px,rgba(180,140,90,.12) 40px);
    border-radius:8px;
  }
  .room-label{position:absolute;left:14px;top:14px;font-size:12px;color:rgba(255,255,255,.9);background:rgba(232,103,126,.6);padding:2px 10px;border-radius:999px;z-index:2}

  /* 已放置家具 */
  .placed{
    position:absolute;display:flex;align-items:center;justify-content:center;cursor:move;user-select:none;
    z-index:5;transition:filter .2s;
  }
  .placed .ic{font-size:38px;filter:drop-shadow(0 3px 4px rgba(0,0,0,.2))}
  .placed .nm{position:absolute;bottom:-14px;font-size:9px;color:#888;background:#fff;padding:0 4px;border-radius:4px;white-space:nowrap}
  .placed.selected{filter:drop-shadow(0 0 6px var(--pink))}
  .placed.selected::after{
    content:"";position:absolute;inset:-4px;border:2px dashed var(--pink);border-radius:8px;
  }
  .placed .del{
    position:absolute;top:-8px;right:-8px;width:18px;height:18px;background:#ff5a5a;color:#fff;
    border-radius:50%;font-size:11px;line-height:18px;text-align:center;cursor:pointer;display:none;
  }
  .placed.selected .del{display:block}

  /* 右侧属性 */
  .props{width:200px;background:var(--panel);border-left:2px solid var(--line);padding:10px;overflow-y:auto;flex-shrink:0}
  .prop-title{font-size:13px;color:var(--pink-dark);margin:6px 0;padding-bottom:4px;border-bottom:1px dashed var(--line)}
  .prop-title:first-child{margin-top:0}
  .swatches{display:grid;grid-template-columns:repeat(4,1fr);gap:6px}
  .sw{aspect-ratio:1;border-radius:8px;cursor:pointer;border:2px solid transparent;transition:transform .15s}
  .sw:hover{transform:scale(1.1)}
  .sw.on{border-color:var(--pink-dark);box-shadow:0 0 0 2px #fff inset}
  .hint{font-size:11px;color:#aaa;line-height:1.5;margin-top:8px}
  .selbox{background:var(--cream);border-radius:10px;padding:10px;font-size:12px;color:#666}
  .selbtn{display:block;width:100%;margin-top:6px;padding:6px;border:none;border-radius:8px;background:var(--pink);color:#fff;cursor:pointer;font-family:inherit;font-size:12px}
  .selbtn.del{background:#fff;color:#e8677e;border:2px solid var(--pink-light)}

  /* 提示 */
  .toast{position:fixed;left:50%;bottom:24px;transform:translateX(-50%) translateY(20px);
    background:rgba(92,74,82,.95);color:#fff;padding:10px 20px;border-radius:999px;font-size:13px;
    opacity:0;transition:all .3s;z-index:100}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

  @media(max-width:860px){
    .palette,.props{width:150px}
    .room{width:90%;max-width:480px;height:340px}
  }
</style>
</head>
<body>

<div class="topbar">
  <!-- 蝴蝶结 logo -->
  <svg class="logo" viewBox="0 0 100 70">
    <path d="M50 35 L8 12 Q4 10 6 16 L14 50 Q16 56 22 52 L44 38 Z" fill="#ff5a7a"/>
    <path d="M50 35 L92 12 Q96 10 94 16 L86 50 Q84 56 78 52 L56 38 Z" fill="#ff5a7a"/>
    <path d="M50 35 L8 12 Q4 10 6 16 L14 50 Q16 56 22 52 L44 38 Z" fill="#ff7a93" opacity=".5"/>
    <ellipse cx="50" cy="35" rx="9" ry="11" fill="#e04560"/>
    <circle cx="46" cy="33" r="2" fill="#ffb8c5"/>
    <path d="M50 46 L46 64 L54 64 Z" fill="#e04560"/>
  </svg>
  <div class="title">三丽鸥小屋设计游戏<small>Sanrio House Design Game</small></div>
  <div class="spacer"></div>
  <button class="topbtn alt" onclick="randomRoom()">🎲 随机布置</button>
  <button class="topbtn alt" onclick="clearRoom()">🗑 清空</button>
  <button class="topbtn" onclick="saveRoom()">💾 保存设计</button>
</div>

<div class="main">
  <!-- 左：家具库 -->
  <div class="palette" id="palette"></div>

  <!-- 中：房间 -->
  <div class="stage">
    <div class="room" id="room">
      <div class="room-label">🧸 我的小屋</div>
      <div class="room-floor" id="floor"></div>
    </div>
  </div>

  <!-- 右：属性 -->
  <div class="props">
    <div class="prop-title">墙面颜色</div>
    <div class="swatches" id="wallColors"></div>
    <div class="prop-title" style="margin-top:10px">地板样式</div>
    <div class="swatches" id="floorStyles"></div>
    <div class="prop-title" style="margin-top:10px">选中物品</div>
    <div class="selbox" id="selbox">点家具可选中<br>拖动可移动</div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// 家具库数据
const FURNITURE=[
  {cat:'家具',items:[
    {t:'bed',n:'床',i:'🛏️',w:90,h:110},
    {t:'sofa',n:'沙发',i:'🛋️',w:110,h:60},
    {t:'chair',n:'椅子',i:'🪑',w:42,h:42},
    {t:'table',n:'桌子',i:'🪟',w:80,h:50},
    {t:'desk',n:'书桌',i:'📋',w:80,h:50},
    {t:'wardrobe',n:'衣柜',i:'🚪',w:60,h:70},
    {t:'tv',n:'电视',i:'📺',w:70,h:40},
    {t:'lamp',n:'台灯',i:'💡',w:34,h:34},
  ]},
  {cat:'装饰',items:[
    {t:'rug',n:'地毯',i:'🟥',w:120,h:80},
    {t:'window',n:'窗户',i:'🪟',w:60,h:40},
    {t:'mirror',n:'镜子',i:'🪞',w:40,h:50},
    {t:'clock',n:'挂钟',i:'🕐',w:36,h:36},
    {t:'painting',n:'画作',i:'🖼️',w:50,h:40},
    {t:'candle',n:'蜡烛',i:'🕯️',w:30,h:30},
    {t:'gift',n:'礼物',i:'🎁',w:36,h:36},
    {t:'bow',n:'蝴蝶结',i:'🎀',w:36,h:36},
  ]},
  {cat:'植物',items:[
    {t:'potted',n:'盆栽',i:'🪴',w:42,h:42},
    {t:'flower',n:'花束',i:'💐',w:40,h:40},
    {t:'tree',n:'小树',i:'🌳',w:50,h:50},
    {t:'cactus',n:'仙人掌',i:'🌵',w:40,h:50},
    {t:'tulip',n:'郁金香',i:'🌷',w:34,h:40},
    {t:'cherry',n:'樱花',i:'🌸',w:38,h:38},
  ]},
  {cat:'三丽鸥',items:[
    {t:'kitty',n:'凯蒂猫',i:'🐱',w:46,h:46},
    {t:'cinnamon',n:'玉桂狗',i:'🐶',w:46,h:46},
    {t:'melody',n:'美乐蒂',i:'🐰',w:46,h:46},
    {t:'purin',n:'布丁狗',i:'🐹',w:46,h:46},
    {t:'pompom',n:'大耳狗',i:'🐻',w:46,h:46},
    {t:'kiki',n:'双子星',i:'👾',w:40,h:40},
    {t:'patty',n:'帕恰狗',i:'🦴',w:46,h:46},
    {t:'hangy',n:'大眼蛙',i:'🐸',w:46,h:46},
  ]},
];

const WALL_COLORS=[
  {n:'樱花粉',c:'#ffd6df'},{n:'薄荷绿',c:'#b8e6c9'},{n:'天空蓝',c:'#a8d8f0'},
  {n:'柠檬黄',c:'#ffe89a'},{n:'薰衣紫',c:'#d4b8e6'},{n:'奶油白',c:'#fff8ee'},
  {n:'蜜桃橙',c:'#ffd4b8'},{n:'珊瑚红',c:'#ffb0b8'},
];
const FLOOR_STYLES=[
  {n:'原木',c:'#fff3e0'},{n:'暖棕',c:'#e8d4b0'},{n:'白砖',c:'#f5f5f5'},
  {n:'粉砖',c:'#ffe0e8'},{n:'绿格',c:'#e0f0d8'},{n:'蓝砖',c:'#e0ecf5'},
  {n:'米色',c:'#f0e8d8'},{n:'灰石',c:'#e8e8e8'},
];

// 渲染家具库
const palette=document.getElementById('palette');
FURNITURE.forEach(g=>{
  const t=document.createElement('div');t.className='cat-title';t.textContent=g.cat;
  const items=document.createElement('div');items.className='items';
  g.items.forEach(it=>{
    const d=document.createElement('div');d.className='item';d.draggable=true;
    d.innerHTML=`<div class="ic">${it.i}</div><div class="nm">${it.n}</div>`;
    d.dataset.t=it.t;d.dataset.n=it.n;d.dataset.i=it.i;
    d.dataset.w=it.w;d.dataset.h=it.h;
    d.addEventListener('click',()=>addFurniture(it));
    d.addEventListener('dragstart',e=>{
      e.dataTransfer.setData('text',JSON.stringify(it));
    });
    items.appendChild(d);
  });
  palette.appendChild(t);palette.appendChild(items);
});

// 渲染色板
const wallBox=document.getElementById('wallColors');
WALL_COLORS.forEach((c,i)=>{
  const s=document.createElement('div');s.className='sw'+(i===0?' on':'');s.style.background=c.c;s.title=c.n;
  s.onclick=()=>{document.querySelectorAll('#wallColors .sw').forEach(x=>x.classList.remove('on'));s.classList.add('on');
    document.getElementById('room').style.background=c.c;toast('墙面：'+c.n)};
  wallBox.appendChild(s);
});
const floorBox=document.getElementById('floorStyles');
FLOOR_STYLES.forEach((c,i)=>{
  const s=document.createElement('div');s.className='sw'+(i===0?' on':'');s.style.background=c.c;s.title=c.n;
  s.onclick=()=>{document.querySelectorAll('#floorStyles .sw').forEach(x=>x.classList.remove('on'));s.classList.add('on');
    document.getElementById('floor').style.background=c.c;toast('地板：'+c.n)};
  floorBox.appendChild(s);
});

// 房间逻辑
const room=document.getElementById('room');
let placed=[];
let selected=null;
let zTop=5;

function addFurniture(it){
  const rect=room.getBoundingClientRect();
  const x=rect.width/2-it.w/2+(Math.random()*60-30);
  const y=rect.height/2-it.h/2+(Math.random()*60-30);
  createPlaced(it,x,y);
  toast('已添加：'+it.n);
}

function createPlaced(it,x,y){
  const el=document.createElement('div');
  el.className='placed';el.style.width=it.w+'px';el.style.height=it.h+'px';
  el.style.left=Math.max(8,Math.min(x,room.clientWidth-it.w-8))+'px';
  el.style.top=Math.max(8,Math.min(y,room.clientHeight-it.h-8))+'px';
  el.style.zIndex=++zTop;
  el.dataset.t=it.t;el.dataset.i=it.i;el.dataset.n=it.n;
  let rot=0;
  el.innerHTML=`<div class="ic">${it.i}</div><div class="nm">${it.n}</div><div class="del" onclick="event.stopPropagation();removePlaced(this.parentElement)">×</div>`;
  el.onclick=e=>{e.stopPropagation();selectPlaced(el)};
  enableDrag(el);
  room.appendChild(el);
  placed.push({el,t:it.t});
  selectPlaced(el);
}

function enableDrag(el){
  let sx,sy,ox,oy,drag=false;
  el.addEventListener('mousedown',e=>{
    if(e.target.classList.contains('del'))return;
    drag=true;sx=e.clientX;sy=e.clientY;ox=el.offsetLeft;oy=el.offsetTop;
    el.style.zIndex=++zTop;e.preventDefault();
  });
  document.addEventListener('mousemove',e=>{
    if(!drag)return;
    let nx=ox+e.clientX-sx,ny=oy+e.clientY-sy;
    nx=Math.max(8,Math.min(nx,room.clientWidth-el.offsetWidth-8));
    ny=Math.max(8,Math.min(ny,room.clientHeight-el.offsetHeight-8));
    el.style.left=nx+'px';el.style.top=ny+'px';
  });
  document.addEventListener('mouseup',()=>drag=false);
  // 触摸支持
  el.addEventListener('touchstart',e=>{
    if(e.target.classList.contains('del'))return;
    const t=e.touches[0];drag=true;sx=t.clientX;sy=t.clientY;ox=el.offsetLeft;oy=el.offsetTop;el.style.zIndex=++zTop;
  },{passive:true});
  el.addEventListener('touchmove',e=>{
    if(!drag)return;const t=e.touches[0];
    let nx=ox+t.clientX-sx,ny=oy+t.clientY-sy;
    nx=Math.max(8,Math.min(nx,room.clientWidth-el.offsetWidth-8));
    ny=Math.max(8,Math.min(ny,room.clientHeight-el.offsetHeight-8));
    el.style.left=nx+'px';el.style.top=ny+'px';e.preventDefault();
  },{passive:false});
  el.addEventListener('touchend',()=>drag=false);
}

function selectPlaced(el){
  document.querySelectorAll('.placed').forEach(x=>x.classList.remove('selected'));
  el.classList.add('selected');selected=el;
  const sb=document.getElementById('selbox');
  sb.innerHTML=`已选中：<b>${el.dataset.n}</b><br>双击可旋转<br>`+
    `<button class="selbtn" onclick="rotateSelected()">🔄 旋转 90°</button>`+
    `<button class="selbtn del" onclick="removeSelected()">🗑 删除</button>`;
}

room.addEventListener('click',e=>{
  if(e.target===room||e.target.id==='floor'||e.target.classList.contains('room-label')){
    document.querySelectorAll('.placed').forEach(x=>x.classList.remove('selected'));selected=null;
    document.getElementById('selbox').innerHTML='点家具可选中<br>拖动可移动';
  }
});

// 双击旋转
room.addEventListener('dblclick',e=>{
  const p=e.target.closest('.placed');if(p){rotateEl(p);}
});
function rotateSelected(){if(selected)rotateEl(selected);}
function rotateEl(el){
  let r=parseInt(el.dataset.rot||0)+90;r%=360;el.dataset.rot=r;
  el.querySelector('.ic').style.transform=`rotate(${r}deg)`;
}

function removeSelected(){if(selected)removePlaced(selected)}
function removePlaced(el){
  el.remove();placed=placed.filter(p=>p.el!==el);
  if(selected===el){selected=null;document.getElementById('selbox').innerHTML='点家具可选中<br>拖动可移动';}
}

function clearRoom(){
  document.querySelectorAll('.placed').forEach(x=>x.remove());placed=[];selected=null;
  document.getElementById('selbox').innerHTML='点家具可选中<br>拖动可移动';
  toast('已清空房间');
}

function randomRoom(){
  clearRoom();
  const all=FURNITURE.flatMap(g=>g.items);
  const picks=all.sort(()=>Math.random()-.5).slice(0,8);
  picks.forEach(it=>{
    const x=20+Math.random()*(room.clientWidth-it.w-40);
    const y=20+Math.random()*(room.clientHeight-it.h-40);
    createPlaced(it,x,y);
  });
  document.querySelectorAll('.placed').forEach(x=>x.classList.remove('selected'));selected=null;
  toast('随机布置完成 🎲');
}

function saveRoom(){
  // 用 localStorage 保存布局快照
  const data=[...document.querySelectorAll('.placed')].map(el=>({
    t:el.dataset.t,n:el.dataset.n,i:el.dataset.i,
    w:el.offsetWidth,h:el.offsetHeight,x:el.offsetLeft,y:el.offsetTop,
    r:parseInt(el.dataset.rot||0)
  }));
  localStorage.setItem('sanrio_house',JSON.stringify(data));
  toast('设计已保存！共 '+data.length+' 件家具 💾');
}

// 拖入房间
room.addEventListener('dragover',e=>e.preventDefault());
room.addEventListener('drop',e=>{
  e.preventDefault();
  try{
    const it=JSON.parse(e.dataTransfer.getData('text'));
    const rect=room.getBoundingClientRect();
    addFurniture(it);
  }catch(_){}
});

function toast(msg){
  const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');
  clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('show'),1800);
}

// 加载已保存
window.addEventListener('load',()=>{
  const saved=localStorage.getItem('sanrio_house');
  if(saved){
    try{
      JSON.parse(saved).forEach(d=>{
        const el=document.createElement('div');
        el.className='placed';el.style.width=d.w+'px';el.style.height=d.h+'px';
        el.style.left=d.x+'px';el.style.top=d.y+'px';el.style.zIndex=++zTop;
        el.dataset.t=d.t;el.dataset.i=d.i;el.dataset.n=d.n;el.dataset.rot=d.r||0;
        el.innerHTML=`<div class="ic" style="transform:rotate(${d.r||0}deg)">${d.i}</div><div class="nm">${d.n}</div><div class="del" onclick="event.stopPropagation();removePlaced(this.parentElement)">×</div>`;
        el.onclick=e=>{e.stopPropagation();selectPlaced(el)};
        enableDrag(el);room.appendChild(el);placed.push({el,t:d.t});
      });
      if(placed.length)toast('已加载上次的设计');
    }catch(_){}
  }
});
</script>
</body>
</html>

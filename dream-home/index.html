<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>三丽鸥小屋设计游戏 · Sanrio House Design</title>
<link href="https://fonts.googleapis.com/css2?family=ZCOOL+KuaiLe&family=Nunito:wght@600;800&family=Ma+Shan+Zheng&display=swap" rel="stylesheet">
<style>
  :root{
    --wall:#d4e4c3; --wall-2:#c2d6ae; --floor:#e8d4b0; --floor-2:#d4c096;
    --sky:#b8d4e3; --sea:#7bb8c9; --tree:#7da87b; --tree-2:#5d8a5b;
    --pink:#ff8fa3; --pink-d:#e8677e; --pink-l:#ffd6df;
    --cream:#fff8ee; --mint:#b8e6c9; --blue:#a8d8f0; --yellow:#ffe89a;
    --bg:#fff0f4; --panel:#ffffff; --text:#5c4a52; --line:#f0d8df;
    --gold:#f0c060; --purple:#b8a0d8;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%;font-family:"ZCOOL KuaiLe","Nunito","Microsoft YaHei",sans-serif;color:var(--text);background:var(--bg)}
  body{display:flex;flex-direction:column;overflow:hidden}

  /* ========== 开场动画 ========== */
  #intro{
    position:fixed;inset:0;z-index:9999;display:flex;flex-direction:column;
    align-items:center;justify-content:center;
    background:linear-gradient(135deg,#2a1a3a 0%,#4a2a5a 25%,#6a3a6a 50%,#8a4a7a 75%,#aa5a8a 100%);
    transition:opacity 1.2s ease,transform 1.2s ease;overflow:hidden;
  }
  #intro.gone{opacity:0;transform:scale(1.08);pointer-events:none}
  /* 星光粒子 */
  .sparkle{position:absolute;width:4px;height:4px;background:#fff;border-radius:50%;
    box-shadow:0 0 6px #fff,0 0 12px #ffd0e0;animation:sparkleFloat 3s ease-in-out infinite;opacity:0}
  .sparkle.big{width:7px;height:7px;box-shadow:0 0 10px #fff,0 0 20px #ffe0a0,0 0 30px #ffc0e0}
  @keyframes sparkleFloat{
    0%,100%{opacity:0;transform:translateY(0) scale(.5)}
    50%{opacity:1;transform:translateY(-30px) scale(1.2)}
  }
  /* 光晕 */
  .glow-ring{position:absolute;border-radius:50%;border:2px solid rgba(255,200,220,.15);
    animation:ringPulse 4s ease-in-out infinite}
  @keyframes ringPulse{0%,100%{transform:scale(.8);opacity:.3}50%{transform:scale(1.1);opacity:.6}}
  /* 标题 */
  .intro-title{
    font-family:"Ma Shan Zheng","ZCOOL KuaiLe",serif;font-size:42px;
    background:linear-gradient(90deg,#ffd0e0,#ffe8a0,#a8d8f0,#ffd0e0);
    background-size:300% 100%;-webkit-background-clip:text;background-clip:text;
    -webkit-text-fill-color:transparent;
    animation:titleShimmer 3s linear infinite,titleAppear 1.5s ease-out;
    text-shadow:0 0 40px rgba(255,200,220,.5);letter-spacing:4px;
    position:relative;z-index:10;
  }
  .intro-sub{font-size:14px;color:rgba(255,220,235,.7);margin-top:8px;letter-spacing:6px;
    animation:subFade 2s ease-out .8s both;z-index:10}
  @keyframes titleShimmer{0%{background-position:0% 0}100%{background-position:300% 0}}
  @keyframes titleAppear{0%{opacity:0;transform:translateY(30px) scale(.8)}100%{opacity:1;transform:translateY(0) scale(1)}}
  @keyframes subFade{0%{opacity:0}100%{opacity:.7}}
  /* 角色飘入 */
  .intro-chars{display:flex;gap:24px;margin-top:36px;z-index:10}
  .intro-char{width:56px;height:56px;opacity:0;animation:charFloatIn 1s ease-out both,charBob 2.5s ease-in-out infinite}
  .intro-char:nth-child(1){animation-delay:1.2s,2.2s}
  .intro-char:nth-child(2){animation-delay:1.4s,2.4s}
  .intro-char:nth-child(3){animation-delay:1.6s,2.6s}
  .intro-char:nth-child(4){animation-delay:1.8s,2.8s}
  .intro-char:nth-child(5){animation-delay:2.0s,3.0s}
  @keyframes charFloatIn{0%{opacity:0;transform:translateY(40px) scale(.5)}100%{opacity:1;transform:translateY(0) scale(1)}}
  @keyframes charBob{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
  /* 进入提示 */
  .intro-enter{
    margin-top:32px;padding:10px 32px;border:2px solid rgba(255,200,220,.4);
    border-radius:999px;color:#fff;font-size:15px;font-family:inherit;letter-spacing:3px;
    background:rgba(255,255,255,.08);cursor:pointer;z-index:10;
    animation:enterPulse 1.5s ease-in-out infinite,enterFade .8s ease-out 3s both;
    transition:background .3s,transform .2s;
  }
  .intro-enter:hover{background:rgba(255,255,255,.2);transform:scale(1.05)}
  @keyframes enterPulse{0%,100%{box-shadow:0 0 20px rgba(255,200,220,.3)}50%{box-shadow:0 0 40px rgba(255,200,220,.6)}}
  @keyframes enterFade{0%{opacity:0}100%{opacity:1}}
  /* 帘幕 */
  .curtain{position:absolute;top:0;bottom:0;width:50%;z-index:5;
    transition:transform 1.5s cubic-bezier(.7,0,.3,1)}
  .curtain.left{left:0;background:linear-gradient(90deg,#3a1a4a,#5a2a5a)}
  .curtain.right{right:0;background:linear-gradient(270deg,#3a1a4a,#5a2a5a)}
  #intro.opening .curtain.left{transform:translateX(-100%)}
  #intro.opening .curtain.right{transform:translateX(100%)}
  .curtain::before{content:"";position:absolute;top:0;bottom:0;width:20px;
    background:repeating-linear-gradient(0deg,transparent 0,transparent 30px,rgba(255,255,255,.05) 30px,rgba(255,255,255,.05) 60px)}
  .curtain.left::before{right:0}
  .curtain.right::before{left:0}

  /* ========== 顶栏 ========== */
  .topbar{
    display:flex;align-items:center;gap:14px;padding:8px 18px;
    background:linear-gradient(90deg,#fff,var(--pink-l));border-bottom:2px solid var(--pink-l);
    box-shadow:0 2px 8px rgba(232,103,126,.12);z-index:20
  }
  .logo{width:44px;height:44px;flex-shrink:0}
  .title{font-size:19px;font-weight:700;color:var(--pink-d)}
  .title small{display:block;font-size:10px;color:#a88;font-weight:400}
  .spacer{flex:1}
  .topbtn{border:none;padding:7px 13px;border-radius:999px;cursor:pointer;font-family:inherit;font-size:13px;background:var(--pink);color:#fff;box-shadow:0 3px 0 var(--pink-d);transition:transform .15s}
  .topbtn:active{transform:translateY(3px);box-shadow:none}
  .topbtn.alt{background:#fff;color:var(--pink-d);box-shadow:0 3px 0 var(--pink-l)}

  .main{flex:1;display:flex;overflow:hidden}

  /* ========== 左侧家具库 ========== */
  .palette{width:190px;background:var(--panel);border-right:2px solid var(--line);overflow-y:auto;padding:8px;flex-shrink:0}
  .cat-title{font-size:12px;color:var(--pink-d);margin:6px 0 4px;padding-bottom:3px;border-bottom:1px dashed var(--line)}
  .cat-title:first-child{margin-top:0}
  .items{display:grid;grid-template-columns:1fr 1fr;gap:6px}
  .item{background:var(--cream);border:2px solid var(--line);border-radius:10px;padding:4px;text-align:center;cursor:grab;transition:all .2s;user-select:none}
  .item:hover{border-color:var(--pink);transform:translateY(-2px);box-shadow:0 4px 10px rgba(255,143,163,.2)}
  .item svg{width:42px;height:42px;display:block;margin:0 auto}
  .item .nm{font-size:10px;color:#888;margin-top:2px}

  /* ========== 中央房间 - 增强真实感 ========== */
  .stage{flex:1;display:flex;align-items:center;justify-content:center;padding:16px;overflow:auto;
    background:radial-gradient(ellipse at 50% 40%,rgba(255,240,220,.4),transparent 70%)}
  .room{
    position:relative;width:620px;height:460px;border-radius:12px;overflow:hidden;
    box-shadow:0 20px 50px rgba(80,90,70,.3),0 6px 0 rgba(0,0,0,.08),inset 0 0 0 3px rgba(255,255,255,.15);
  }
  /* 天花板 */
  .ceiling{position:absolute;top:0;left:0;right:0;height:16px;
    background:linear-gradient(180deg,#f5efe0,#e8dcc6);z-index:1;
    box-shadow:0 2px 4px rgba(180,160,130,.2)}
  .ceiling::after{content:"";position:absolute;left:0;right:0;bottom:0;height:3px;
    background:linear-gradient(90deg,rgba(180,160,130,.4),rgba(180,160,130,.2),rgba(180,160,130,.4))}
  /* 吊灯 */
  .pendant{position:absolute;top:0;left:50%;transform:translateX(-50%);z-index:4}
  .pendant-cord{width:2px;height:22px;background:#c9a87c;margin:0 auto}
  .pendant-shade{width:30px;height:18px;background:linear-gradient(180deg,#ffd4b8,#ff8fa3);
    border-radius:0 0 15px 15px;box-shadow:0 4px 12px rgba(255,143,163,.4)}
  .pendant-light{position:absolute;top:38px;left:50%;transform:translateX(-50%);
    width:120px;height:80px;background:radial-gradient(ellipse at center top,rgba(255,250,200,.25),transparent 70%);
    pointer-events:none;z-index:3;animation:lightFlicker 4s ease-in-out infinite}
  @keyframes lightFlicker{0%,100%{opacity:.8}50%{opacity:1}}
  /* 后墙 - 带纹理 */
  .back-wall{position:absolute;top:16px;left:0;right:0;bottom:32%;
    background:linear-gradient(180deg,var(--wall),var(--wall-2));transition:background .4s;z-index:1}
  .back-wall::before{content:"";position:absolute;inset:0;opacity:.15;
    background:repeating-linear-gradient(0deg,transparent 0,transparent 40px,rgba(255,255,255,.08) 40px,rgba(255,255,255,.08) 41px,
    transparent 41px,transparent 80px,rgba(0,0,0,.03) 80px,rgba(0,0,0,.03) 81px)}
  /* 墙面光晕（窗户投射） */
  .wall-light{position:absolute;top:16px;left:0;right:0;bottom:32%;z-index:2;pointer-events:none;
    background:radial-gradient(ellipse 40% 60% at 50% 30%,rgba(255,250,210,.2),transparent 70%)}
  /* 墙脚线 */
  .baseboard{position:absolute;left:0;right:0;bottom:32%;height:12px;
    background:linear-gradient(180deg,#fff8ee,#f0e4d0);z-index:3;
    box-shadow:0 -2px 0 rgba(180,160,130,.2),0 2px 4px rgba(0,0,0,.06)}
  /* 地板 - 带透视和反光 */
  .floor{position:absolute;left:0;right:0;bottom:0;height:32%;
    background:linear-gradient(180deg,var(--floor),var(--floor-2));transition:background .4s;z-index:1;
    perspective:300px}
  .floor::before{content:"";position:absolute;inset:0;
    background:repeating-linear-gradient(90deg,transparent 0,transparent 48px,rgba(160,130,80,.12) 49px,rgba(160,130,80,.12) 50px)}
  .floor::after{content:"";position:absolute;inset:0;
    background:linear-gradient(180deg,rgba(255,255,255,.08) 0%,transparent 30%,transparent 70%,rgba(0,0,0,.06) 100%)}
  /* 地板光斑（窗户阳光投射） */
  .sun-patch{position:absolute;bottom:0;left:20%;width:50%;height:32%;z-index:2;pointer-events:none;
    background:linear-gradient(160deg,rgba(255,250,200,.18) 0%,rgba(255,240,180,.08) 50%,transparent 80%);
    transform:skewX(-8deg);animation:sunShift 8s ease-in-out infinite}
  @keyframes sunShift{0%,100%{opacity:.7;transform:skewX(-8deg) translateX(0)}50%{opacity:1;transform:skewX(-6deg) translateX(10px)}}
  /* 窗户 - 增强细节 */
  .window{position:absolute;left:50%;top:8%;transform:translateX(-50%);width:46%;height:62%;
    background:linear-gradient(180deg,var(--sky) 0%,#d4e8f0 50%,var(--sea) 50%,#6aa7b8 100%);
    border:10px solid #fff8ee;border-radius:6px;
    box-shadow:0 6px 14px rgba(0,0,0,.12),inset 0 0 0 3px rgba(220,200,170,.3),0 0 30px rgba(255,250,200,.15);
    z-index:2;overflow:hidden}
  .window::before,.window::after{content:"";position:absolute;background:#fff8ee;z-index:3}
  .window::before{left:50%;top:0;bottom:0;width:6px;transform:translateX(-50%)}
  .window::after{left:0;right:0;top:50%;height:6px;transform:translateY(-50%)}
  /* 太阳 */
  .sun{position:absolute;top:8%;right:12%;width:24px;height:24px;border-radius:50%;
    background:radial-gradient(circle,#fff8c8,#ffe89a);box-shadow:0 0 20px rgba(255,232,154,.6);
    animation:sunGlow 3s ease-in-out infinite}
  @keyframes sunGlow{0%,100%{box-shadow:0 0 20px rgba(255,232,154,.6)}50%{box-shadow:0 0 30px rgba(255,232,154,.9)}}
  .cloud{position:absolute;background:#fff;border-radius:50px;opacity:.92;filter:blur(.5px)}
  .cloud::before,.cloud::after{content:"";position:absolute;background:#fff;border-radius:50%}
  .c1{width:60px;height:20px;top:14%;left:8%;animation:drift 30s linear infinite}
  .c1::before{width:30px;height:30px;top:-14px;left:10px}
  .c1::after{width:24px;height:24px;top:-10px;right:10px}
  .c2{width:48px;height:16px;top:30%;left:-20%;animation:drift 40s linear infinite;animation-delay:-12s}
  .c2::before{width:24px;height:24px;top:-12px;left:8px}
  .distant{position:absolute;bottom:42%;left:-10%;right:-10%;height:60px;
    background:var(--tree);border-radius:50% 50% 0 0/40% 40% 0 0;opacity:.85;z-index:1}
  .distant::after{content:"";position:absolute;right:10%;bottom:0;width:60%;height:100%;
    background:var(--tree-2);border-radius:50% 50% 0 0/40% 40% 0 0;opacity:.6}
  /* 飞鸟 */
  .bird{position:absolute;top:20%;left:15%;font-size:10px;color:#555;animation:birdFly 15s linear infinite}
  @keyframes birdFly{0%{left:15%;top:20%}25%{left:40%;top:15%}50%{left:60%;top:22%}75%{left:80%;top:18%}100%{left:105%;top:20%}}
  /* 光柱（从窗户射入） */
  .light-beam{position:absolute;top:16px;left:30%;width:40%;bottom:0;z-index:4;pointer-events:none;
    background:linear-gradient(160deg,rgba(255,250,210,.06) 0%,rgba(255,240,180,.1) 30%,rgba(255,230,160,.04) 60%,transparent 90%);
    transform:skewX(-12deg);clip-path:polygon(15% 0,85% 0,100% 100%,0% 100%)}
  /* 房间标签 */
  .room-label{position:absolute;left:12px;top:22px;font-size:11px;color:#fff;
    background:rgba(232,103,126,.7);padding:2px 10px;border-radius:999px;z-index:5;
    box-shadow:0 2px 6px rgba(232,103,126,.3)}

  /* ========== 小猫 ========== */
  .pet-cat{position:absolute;bottom:2%;left:30%;width:48px;height:40px;z-index:8;cursor:pointer;
    transition:left 3s ease-in-out;filter:drop-shadow(0 4px 6px rgba(80,60,40,.3))}
  .pet-cat svg{width:100%;height:100%}
  .pet-cat .cat-tail{transform-origin:30px 28px;animation:tailWag 1.5s ease-in-out infinite}
  @keyframes tailWag{0%,100%{transform:rotate(-5deg)}50%{transform:rotate(15deg)}}
  .pet-cat .cat-eye{animation:catBlink 4s ease-in-out infinite}
  @keyframes catBlink{0%,92%,100%{transform:scaleY(1)}95%{transform:scaleY(.1)}}
  .pet-cat.walking{animation:catWalk .5s ease-in-out infinite}
  @keyframes catWalk{0%,100%{transform:translateY(0)}50%{transform:translateY(-3px)}}
  .pet-cat.sleeping .cat-body{animation:catBreathe 2.5s ease-in-out infinite}
  @keyframes catBreathe{0%,100%{transform:scaleY(1)}50%{transform:scaleY(1.05)}}
  .pet-cat.sleeping .cat-tail{animation:tailSleep 3s ease-in-out infinite}
  @keyframes tailSleep{0%,100%{transform:rotate(0)}50%{transform:rotate(8deg)}}
  .pet-cat.sleeping::after{content:"Z z z";position:absolute;top:-16px;right:-8px;font-size:10px;
    color:rgba(180,160,200,.7);animation:zzzFloat 2s ease-in-out infinite}
  @keyframes zzzFloat{0%,100%{opacity:.3;transform:translateY(0)}50%{opacity:.8;transform:translateY(-6px)}}
  .heart-particle{position:absolute;font-size:16px;pointer-events:none;z-index:9;
    animation:heartFloat 1.2s ease-out forwards}
  @keyframes heartFloat{0%{opacity:1;transform:translateY(0) scale(.5)}100%{opacity:0;transform:translateY(-40px) scale(1.5)}}
  .meow-bubble{position:absolute;top:-30px;left:50%;transform:translateX(-50%);
    background:#fff;border:2px solid var(--pink-l);border-radius:12px;padding:2px 8px;
    font-size:11px;color:var(--pink-d);white-space:nowrap;z-index:10;
    animation:bubblePop .5s ease-out;box-shadow:0 2px 6px rgba(0,0,0,.1)}
  .meow-bubble::after{content:"";position:absolute;bottom:-6px;left:50%;transform:translateX(-50%);
    border:4px solid transparent;border-top-color:#fff}
  @keyframes bubblePop{0%{opacity:0;transform:translateX(-50%) scale(.5)}50%{transform:translateX(-50%) scale(1.1)}100%{opacity:1;transform:translateX(-50%) scale(1)}}

  /* ========== 已放置家具 ========== */
  .placed{position:absolute;cursor:move;user-select:none;z-index:5;transition:filter .2s;
    filter:drop-shadow(0 4px 8px rgba(80,90,70,.3))}
  .placed svg{width:100%;height:100%;display:block}
  .placed.selected{filter:drop-shadow(0 0 10px var(--pink)) drop-shadow(0 4px 8px rgba(80,90,70,.3))}
  .placed.selected::after{content:"";position:absolute;inset:-4px;border:2px dashed var(--pink);border-radius:8px;pointer-events:none}
  .placed .del{position:absolute;top:-9px;right:-9px;width:20px;height:20px;background:#ff5a5a;color:#fff;border-radius:50%;font-size:13px;line-height:20px;text-align:center;cursor:pointer;display:none;z-index:6}
  .placed.selected .del{display:block}

  /* ========== 右侧属性 ========== */
  .props{width:190px;background:var(--panel);border-left:2px solid var(--line);padding:8px;overflow-y:auto;flex-shrink:0}
  .prop-title{font-size:12px;color:var(--pink-d);margin:6px 0 4px;padding-bottom:3px;border-bottom:1px dashed var(--line)}
  .prop-title:first-child{margin-top:0}
  .swatches{display:grid;grid-template-columns:repeat(4,1fr);gap:5px}
  .sw{aspect-ratio:1;border-radius:7px;cursor:pointer;border:2px solid transparent;transition:transform .15s}
  .sw:hover{transform:scale(1.1)}
  .sw.on{border-color:var(--pink-d);box-shadow:0 0 0 2px #fff inset}
  .selbox{background:var(--cream);border-radius:9px;padding:9px;font-size:11px;color:#666;line-height:1.5}
  .selbtn{display:block;width:100%;margin-top:5px;padding:5px;border:none;border-radius:7px;background:var(--pink);color:#fff;cursor:pointer;font-family:inherit;font-size:11px}
  .selbtn.del{background:#fff;color:var(--pink-d);border:2px solid var(--pink-l)}
  .pet-info{background:linear-gradient(135deg,var(--pink-l),var(--cream));border-radius:9px;padding:8px;font-size:11px;color:var(--pink-d);line-height:1.5;margin-top:4px}
  .pet-info b{font-size:12px}

  .toast{position:fixed;left:50%;bottom:20px;transform:translateX(-50%) translateY(20px);background:rgba(92,74,82,.95);color:#fff;padding:9px 18px;border-radius:999px;font-size:13px;opacity:0;transition:all .3s;z-index:100}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

  @keyframes drift{from{transform:translateX(0)}to{transform:translateX(360%)}}
  @media(max-width:900px){.palette,.props{width:150px}.room{width:90%;max-width:520px;height:380px}}
</style>
</head>
<body>

<!-- ========== 开场动画 ========== -->
<div id="intro">
  <div class="curtain left"></div>
  <div class="curtain right"></div>
  <div class="glow-ring" style="width:300px;height:300px;top:30%;left:35%"></div>
  <div class="glow-ring" style="width:500px;height:500px;top:20%;left:25%;animation-delay:1s"></div>
  <div id="sparkles"></div>
  <div class="intro-title">三丽鸥小屋设计游戏</div>
  <div class="intro-sub">SANRIO HOUSE DESIGN</div>
  <div class="intro-chars" id="introChars"></div>
  <button class="intro-enter" onclick="startGame()">✦ 进入小屋 ✦</button>
</div>

<!-- ========== 主界面 ========== -->
<div class="topbar">
  <svg class="logo" viewBox="0 0 100 70">
    <path d="M50 35 L8 12 Q4 10 6 16 L14 50 Q16 56 22 52 L44 38 Z" fill="#ff5a7a"/>
    <path d="M50 35 L92 12 Q96 10 94 16 L86 50 Q84 56 78 52 L56 38 Z" fill="#ff5a7a"/>
    <path d="M50 35 L8 12 Q4 10 6 16 L14 50 Q16 56 22 52 L44 38 Z" fill="#ff7a93" opacity=".45"/>
    <ellipse cx="50" cy="35" rx="9" ry="11" fill="#e04560"/>
    <circle cx="46" cy="33" r="2" fill="#ffb8c5"/>
    <path d="M50 46 L46 64 L54 64 Z" fill="#e04560"/>
  </svg>
  <div class="title">三丽鸥小屋设计游戏<small>Sanrio House Design Game</small></div>
  <div class="spacer"></div>
  <button class="topbtn alt" onclick="randomRoom()">🎲 随机布置</button>
  <button class="topbtn alt" onclick="clearRoom()">🗑 清空</button>
  <button class="topbtn" onclick="saveRoom()">💾 保存</button>
</div>

<div class="main">
  <div class="palette" id="palette"></div>

  <div class="stage">
    <div class="room" id="room">
      <div class="ceiling"></div>
      <div class="pendant">
        <div class="pendant-cord"></div>
        <div class="pendant-shade"></div>
      </div>
      <div class="pendant-light"></div>
      <div class="back-wall" id="backWall">
        <div class="window">
          <div class="sun"></div>
          <div class="cloud c1"></div>
          <div class="cloud c2"></div>
          <div class="distant"></div>
          <div class="bird">~</div>
        </div>
      </div>
      <div class="wall-light"></div>
      <div class="light-beam"></div>
      <div class="baseboard"></div>
      <div class="floor" id="floor">

  const y=room.clientHeight-it.h-20-(Math.random()*40);
  createPlaced(it,x,y);toast('已添加：'+it.n);
}
function createPlaced(it,x,y){
  const el=document.createElement('div');el.className='placed';
  el.style.width=it.w+'px';el.style.height=it.h+'px';
  el.style.left=Math.max(4,Math.min(x,room.clientWidth-it.w-4))+'px';
  el.style.top=Math.max(18,Math.min(y,room.clientHeight-it.h-4))+'px';
  el.style.zIndex=++zTop;el.dataset.n=it.n;el.dataset.t=it.t;
  el.innerHTML=SVG[it.svg]+`<div class="del" onclick="event.stopPropagation();removePlaced(this.parentElement)">×</div>`;
  el.onclick=e=>{e.stopPropagation();selectPlaced(el)};
  enableDrag(el);room.appendChild(el);selectPlaced(el);
}
function enableDrag(el){
  let sx,sy,ox,oy,drag=false;
  const down=(cx,cy)=>{drag=true;sx=cx;sy=cy;ox=el.offsetLeft;oy=el.offsetTop;el.style.zIndex=++zTop;};
  const move=(cx,cy)=>{if(!drag)return;let nx=ox+cx-sx,ny=oy+cy-sy;
    nx=Math.max(4,Math.min(nx,room.clientWidth-el.offsetWidth-4));
    ny=Math.max(18,Math.min(ny,room.clientHeight-el.offsetHeight-4));
    el.style.left=nx+'px';el.style.top=ny+'px';};
  el.addEventListener('mousedown',e=>{if(e.target.classList.contains('del'))return;down(e.clientX,e.clientY);e.preventDefault();});
  document.addEventListener('mousemove',e=>move(e.clientX,e.clientY));
  document.addEventListener('mouseup',()=>drag=false);
  el.addEventListener('touchstart',e=>{if(e.target.classList.contains('del'))return;const t=e.touches[0];down(t.clientX,t.clientY);},{passive:true});
  el.addEventListener('touchmove',e=>{const t=e.touches[0];move(t.clientX,t.clientY);e.preventDefault();},{passive:false});
  el.addEventListener('touchend',()=>drag=false);
}
function selectPlaced(el){
  document.querySelectorAll('.placed').forEach(x=>x.classList.remove('selected'));
  el.classList.add('selected');selected=el;
  document.getElementById('selbox').innerHTML=`已选中：<b>${el.dataset.n}</b><br>拖动移动 · 双击旋转<br>`+
    `<button class="selbtn" onclick="rotateSelected()">🔄 旋转</button>`+
    `<button class="selbtn del" onclick="removeSelected()">🗑 删除</button>`;
}
room.addEventListener('click',e=>{
  if(e.target===room||e.target.id==='floor'||e.target.id==='backWall'||e.target.classList.contains('ceiling')||e.target.classList.contains('baseboard')||e.target.classList.contains('room-label')||e.target.classList.contains('sun-patch')||e.target.classList.contains('wall-light')||e.target.classList.contains('light-beam')){
    document.querySelectorAll('.placed').forEach(x=>x.classList.remove('selected'));selected=null;
    document.getElementById('selbox').innerHTML='点家具可选中<br>拖动可移动<br>双击可旋转';
  }
});
room.addEventListener('dblclick',e=>{const p=e.target.closest('.placed');if(p)rotateEl(p);});
function rotateSelected(){if(selected)rotateEl(selected);}
function rotateEl(el){let r=(parseInt(el.dataset.rot||0)+15)%360;el.dataset.rot=r;el.style.transform=`rotate(${r}deg)`;}
function removeSelected(){if(selected)removePlaced(selected);}
function removePlaced(el){el.remove();if(selected===el){selected=null;document.getElementById('selbox').innerHTML='点家具可选中<br>拖动可移动<br>双击可旋转';}}
function clearRoom(){document.querySelectorAll('.placed').forEach(x=>x.remove());selected=null;document.getElementById('selbox').innerHTML='点家具可选中<br>拖动可移动<br>双击可旋转';toast('已清空房间');}
function randomRoom(){
  clearRoom();const all=FURNITURE.flatMap(g=>g.items);const picks=all.sort(()=>Math.random()-.5).slice(0,7);
  picks.forEach(it=>{const x=20+Math.random()*(room.clientWidth-it.w-40);const y=room.clientHeight-it.h-10-(Math.random()*(room.clientHeight*0.6-it.h));createPlaced(it,x,y);});
  document.querySelectorAll('.placed').forEach(x=>x.classList.remove('selected'));selected=null;toast('随机布置完成 🎲');
}
function saveRoom(){
  const data=[...document.querySelectorAll('.placed')].map(el=>({t:el.dataset.t,n:el.dataset.n,w:el.offsetWidth,h:el.offsetHeight,x:el.offsetLeft,y:el.offsetTop,r:parseInt(el.dataset.rot||0)}));
  localStorage.setItem('sanrio_house_3d',JSON.stringify(data));toast('设计已保存！共 '+data.length+' 件 💾');
}
room.addEventListener('dragover',e=>e.preventDefault());
room.addEventListener('drop',e=>{e.preventDefault();try{addFurniture(JSON.parse(e.dataTransfer.getData('text')))}catch(_){}});
function toast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('show'),1600);}

// ========== 小猫 AI ==========
const catEl=document.getElementById('petCat');
const catStatusEl=document.getElementById('catStatus');
const catStates=['正在好奇地东张西望…','在房间里悠闲散步','找到了一个舒服的位置','正在追逐光斑','偷偷打量着家具','想跳上沙发玩','闻了闻盆栽的味道'];
const catMoods=['喵~','咕噜咕噜~','喵喵！','(伸懒腰)','(打哈欠)'];
let catTimer=null,catState='idle';

function initCat(){
  if(catTimer)return;
  catWander();
  catTimer=setInterval(catWander,6000);
}
function catWander(){
  if(!gameStarted)return;
  const rw=room.clientWidth, rh=room.clientHeight;
  const newX=20+Math.random()*(rw-80);
  const floorY=rh-44;
  catEl.style.left=newX+'px';
  catEl.style.top=floorY+'px';
  // 随机朝向
  catEl.style.transform=newX<parseFloat(catEl.style.left||0)?'scaleX(-1)':'scaleX(1)';
  // 随机状态
  const r=Math.random();
  if(r<.6){
    catEl.classList.remove('sleeping');
    catEl.classList.add('walking');
    catState='walking';
    catStatusEl.textContent=catStates[Math.floor(Math.random()*catStates.length)];
    setTimeout(()=>{catEl.classList.remove('walking');catState='idle';},3000);
  }else if(r<.85){
    catEl.classList.remove('walking');
    catEl.classList.add('sleeping');
    catState='sleeping';
    catStatusEl.textContent='趴下来打盹了… Zzz';
  }else{
    catEl.classList.remove('sleeping','walking');
    catState='idle';
    catStatusEl.textContent='坐下来舔爪子…';
  }
}
function petCat(){
  if(!gameStarted)return;
  // 爱心粒子
  for(let i=0;i<5;i++){
    const h=document.createElement('div');h.className='heart-particle';
    h.textContent=['💕','💖','💗','💓','❤️'][i%5];
    h.style.left=(20+Math.random()*30)+'px';
    h.style.top=(-10+Math.random()*10)+'px';
    h.style.animationDelay=(i*.15)+'s';
    catEl.appendChild(h);
    setTimeout(()=>h.remove(),1300);
  }
  // 喵叫气泡
  const bubble=document.createElement('div');bubble.className='meow-bubble';
  bubble.textContent=catMoods[Math.floor(Math.random()*catMoods.length)];
  catEl.appendChild(bubble);
  setTimeout(()=>bubble.remove(),1500);
  // 状态更新
  catStatusEl.textContent='被抚摸了！好开心~ 咕噜咕噜';
  catEl.classList.remove('sleeping','walking');
  // 3秒后恢复
  clearTimeout(petCat._t);
  petCat._t=setTimeout(()=>{catStatusEl.textContent=catStates[Math.floor(Math.random()*catStates.length)];},3000);
  toast('奶油很开心！🐱💕');
}

// 加载已保存
window.addEventListener('load',()=>{
  const s=localStorage.getItem('sanrio_house_3d');if(!s)return;
  try{JSON.parse(s).forEach(d=>{
    const def=FURNITURE.flatMap(g=>g.items).find(x=>x.t===d.t);if(!def)return;
    const el=document.createElement('div');el.className='placed';el.style.width=d.w+'px';el.style.height=d.h+'px';
    el.style.left=d.x+'px';el.style.top=d.y+'px';el.style.zIndex=++zTop;el.dataset.n=d.n;el.dataset.t=d.t;el.dataset.rot=d.r||0;
    if(d.r)el.style.transform=`rotate(${d.r}deg)`;
    el.innerHTML=SVG[def.svg]+`<div class="del" onclick="event.stopPropagation();removePlaced(this.parentElement)">×</div>`;
    el.onclick=e=>{e.stopPropagation();selectPlaced(el)};enableDrag(el);room.appendChild(el);
  });}catch(_){}
});
</script>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>梦幻小屋设计</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    html, body { width: 100vw; height: 100vh; overflow: hidden; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; }

    .app { position: fixed; inset: 0; }

    /* ---------- 全屏房间背景 ---------- */
    .room-bg {
      position: fixed; inset: 0; z-index: 0;
      width: 100vw; height: 100vh;
      background-repeat: no-repeat;
      background-position: center center;
      background-size: cover;
      transition: background-image 0.6s ease-in-out;
    }

    /* ---------- 家具图层 ---------- */
    .stage {
      position: fixed; inset: 0; z-index: 1;
      pointer-events: none;
    }
    .layer {
      position: absolute;
      pointer-events: none;
      opacity: 0;
      transform: scale(0.95) translateY(12px);
      transform-origin: center bottom;
      transition: opacity 0.45s ease, transform 0.45s cubic-bezier(0.34, 1.56, 0.64, 1);
      filter: drop-shadow(0 18px 34px rgba(28, 18, 12, 0.28));
    }
    .layer.active {
      opacity: 1;
      transform: scale(1) translateY(0);
    }
    .layer img {
      width: 100%; height: 100%;
      object-fit: contain;
      object-position: center bottom;
      display: block;
    }

    /* 默认位置：适配大部分房间视角 */
    .layer-rug   { left: 8%; bottom: 5%; width: 84%; height: 24%; z-index: 1; }
    .layer-sofa  { left: 6%; bottom: 13%; width: 74%; height: 28%; z-index: 2; }
    .layer-chair { right: 4%; bottom: 15%; width: 26%; height: 26%; z-index: 3; }

    /* 海岛大平层：层高更高，地板占比小，家具整体略微上移 */
    .theme-island .layer-rug   { left: 10%; bottom: 7%; width: 80%; height: 22%; }
    .theme-island .layer-sofa  { left: 8%; bottom: 15%; width: 72%; height: 26%; }
    .theme-island .layer-chair { right: 6%; bottom: 17%; width: 24%; height: 24%; }

    /* 带花园小屋：木质地板区域，家具居中 */
    .theme-garden .layer-rug   { left: 10%; bottom: 6%; width: 80%; height: 22%; }
    .theme-garden .layer-sofa  { left: 8%; bottom: 14%; width: 72%; height: 26%; }
    .theme-garden .layer-chair { right: 5%; bottom: 16%; width: 24%; height: 24%; }

    /* 自然风：更贴近底部，强调整体感 */
    .theme-natural .layer-rug   { left: 6%; bottom: 4%; width: 88%; height: 26%; }
    .theme-natural .layer-sofa  { left: 5%; bottom: 12%; width: 76%; height: 28%; }
    .theme-natural .layer-chair { right: 3%; bottom: 14%; width: 28%; height: 26%; }

    /* ---------- 悬浮顶部栏 ---------- */
    .header {
      position: absolute; top: 16px; left: 16px; z-index: 20;
      display: flex; align-items: center; gap: 12px;
      background: rgba(255,255,255,0.88); backdrop-filter: blur(12px);
      border-radius: 14px; padding: 10px 16px;
      box-shadow: 0 4px 18px rgba(0,0,0,0.1);
    }
    .back-btn {
      width: 34px; height: 34px; border-radius: 10px;
      border: none; background: rgba(0,0,0,0.05);
      display: grid; place-items: center; cursor: pointer; font-size: 18px;
      transition: background 0.2s;
    }
    .back-btn:hover { background: rgba(0,0,0,0.1); }
    .brand-title { font-size: 16px; font-weight: 700; color: #2b2b2b; }
    .brand-sub { font-size: 12px; color: #888; }

    .coins {
      position: absolute; top: 16px; right: 344px; z-index: 20;
      display: flex; align-items: center; gap: 6px;
      background: rgba(255,248,231,0.92); backdrop-filter: blur(8px);
      color: #a67c2e; padding: 8px 14px; border-radius: 20px;
      font-weight: 700; font-size: 14px;
      border: 1px solid rgba(201,164,106,0.25);
      box-shadow: 0 4px 14px rgba(0,0,0,0.08);
    }

    /* ---------- 右侧悬浮面板 ---------- */
    .panel {
      position: absolute; top: 0; right: 0; bottom: 0; z-index: 15;
      width: 320px; max-width: 90vw;
      background: rgba(255,255,255,0.82); backdrop-filter: blur(18px);
      border-left: 1px solid rgba(255,255,255,0.4);
      box-shadow: -8px 0 30px rgba(0,0,0,0.12);
      display: flex; flex-direction: column;
      padding: 20px;
      transition: transform 0.3s ease;
    }
    .panel-header { font-size: 18px; font-weight: 700; margin-bottom: 16px; color: #2b2b2b; }

    .tabs { display: flex; gap: 8px; margin-bottom: 16px; overflow-x: auto; }
    .tab {
      flex: 1; padding: 10px; border-radius: 12px; border: none;
      background: rgba(0,0,0,0.05); color: #666; font-size: 13px; font-weight: 600;
      cursor: pointer; transition: all 0.2s; white-space: nowrap;
    }
    .tab.active { background: #2b2b2b; color: #fff; }

    .panel-body { flex: 1; overflow-y: auto; }
    .category { display: none; }
    .category.active { display: block; }
    .category-title { font-size: 13px; color: #888; margin-bottom: 12px; font-weight: 600; }

    .options { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
    .option {
      border: 2px solid rgba(0,0,0,0.06); border-radius: 12px;
      background: rgba(255,255,255,0.6);
      padding: 6px; cursor: pointer; transition: all 0.2s;
      text-align: center;
    }
    .option:hover { border-color: #c9a46a; transform: translateY(-2px); }
    .option.selected { border-color: #e76f51; background: rgba(231,111,81,0.08); }
    .option-thumb {
      width: 100%; aspect-ratio: 1; border-radius: 10px;
      background: rgba(0,0,0,0.03); overflow: hidden;
      display: flex; align-items: center; justify-content: center;
      margin-bottom: 6px;
    }
    .option-thumb img { width: 100%; height: 100%; object-fit: contain; }
    .option-name { font-size: 11px; font-weight: 600; color: #333; }
    .option-tag { font-size: 10px; color: #888; margin-top: 2px; }

    .finish-btn {
      margin-top: 16px; width: 100%; padding: 14px;
      border: none; border-radius: 14px;
      background: linear-gradient(135deg, #d4a373, #e76f51);
      color: #fff; font-size: 16px; font-weight: 700;
      cursor: pointer; box-shadow: 0 6px 18px rgba(231,111,81,0.3);
      transition: transform 0.2s;
    }
    .finish-btn:hover { transform: translateY(-2px); }

    /* ---------- 移动端面板切换 ---------- */
    .panel-toggle {
      display: none;
      position: absolute; bottom: 20px; right: 20px; z-index: 25;
      width: 52px; height: 52px; border-radius: 50%;
      background: rgba(255,255,255,0.9); backdrop-filter: blur(8px);
      border: none; box-shadow: 0 4px 16px rgba(0,0,0,0.15);
      font-size: 22px; cursor: pointer;
    }

    /* ---------- 主题选择屏 ---------- */
    .theme-screen {
      position: fixed; inset: 0; z-index: 50;
      background: linear-gradient(180deg, #fffbf7 0%, #f5f0ea 100%);
      display: flex; flex-direction: column;
      transition: opacity 0.4s ease, transform 0.4s ease;
    }
    .theme-screen.hidden { opacity: 0; transform: translateY(-20px); pointer-events: none; }
    .theme-header { text-align: center; padding: 28px 20px 18px; }
    .theme-header h1 { font-size: 24px; font-weight: 700; margin-bottom: 6px; }
    .theme-header p { color: #888; font-size: 14px; }
    .theme-grid {
      flex: 1; overflow-y: auto;
      display: grid; grid-template-columns: repeat(2, 1fr); gap: 14px;
      padding: 0 18px 24px; align-content: start;
    }
    .theme-card { position: relative; border-radius: 20px; overflow: hidden; aspect-ratio: 1; cursor: pointer; border: 3px solid transparent; background: #fff; box-shadow: 0 6px 18px rgba(0,0,0,0.08); transition: all 0.25s; }
    .theme-card:hover { transform: translateY(-4px); box-shadow: 0 12px 28px rgba(0,0,0,0.12); }
    .theme-card img { width: 100%; height: 100%; object-fit: cover; }
    .theme-card .overlay { position: absolute; inset: 0; background: linear-gradient(180deg, rgba(0,0,0,0) 40%, rgba(0,0,0,0.55) 100%); display: flex; flex-direction: column; justify-content: flex-end; padding: 16px; color: #fff; }
    .theme-card .title { font-size: 17px; font-weight: 700; }
    .theme-card .desc { font-size: 12px; opacity: 0.9; }

    /* ---------- 评分弹窗 ---------- */
    .modal { position: fixed; inset: 0; z-index: 60; display: flex; align-items: center; justify-content: center; opacity: 0; pointer-events: none; transition: opacity 0.3s; background: rgba(0,0,0,0.5); backdrop-filter: blur(4px); }
    .modal.show { opacity: 1; pointer-events: auto; }
    .modal-card { background: #fff; border-radius: 24px; padding: 32px; width: 90%; max-width: 360px; text-align: center; box-shadow: 0 20px 60px rgba(0,0,0,0.2); transform: scale(0.9); transition: transform 0.3s; }
    .modal.show .modal-card { transform: scale(1); }
    .modal-icon { font-size: 56px; margin-bottom: 12px; }
    .modal-title { font-size: 22px; font-weight: 700; margin-bottom: 8px; }
    .modal-text { color: #666; font-size: 14px; margin-bottom: 20px; line-height: 1.6; }
    .modal-coins { font-size: 28px; font-weight: 800; color: #c9a46a; margin-bottom: 20px; }
    .modal-btn { padding: 12px 28px; border: none; border-radius: 12px; background: #2b2b2b; color: #fff; font-weight: 600; cursor: pointer; }

    /* ---------- 响应式 ---------- */
    @media (max-width: 768px) {
      .panel { width: 100%; max-width: none; top: auto; bottom: 0; left: 0; right: 0; height: 55vh; border-left: none; border-radius: 20px 20px 0 0; transform: translateY(100%); }
      .panel.open { transform: translateY(0); }
      .panel-toggle { display: grid; place-items: center; }
      .coins { right: 20px; top: 66px; }
      .header { top: 12px; left: 12px; padding: 8px 12px; }
      .layer-rug { left: 5%; bottom: 4%; width: 90%; height: 22%; }
      .layer-sofa { left: 4%; bottom: 10%; width: 80%; height: 26%; }
      .layer-chair { right: 2%; bottom: 12%; width: 28%; height: 24%; }
    }
  </style>
</head>
<body>
  <div class="app">
    <!-- 主题选择屏 -->
    <div class="theme-screen" id="themeScreen">
      <div class="theme-header">
        <h1>梦幻小屋设计</h1>
        <p>选择一个主题，开始你的装修设计之旅</p>
      </div>
      <div class="theme-grid" id="themeGrid"></div>
    </div>

    <!-- 全屏背景 -->
    <div class="room-bg" id="roomBg"></div>

    <!-- 家具图层 -->
    <div class="stage" id="stage">
      <div class="layer layer-rug" id="layer-rug"></div>
      <div class="layer layer-sofa" id="layer-sofa"></div>
      <div class="layer layer-chair" id="layer-chair"></div>
    </div>

    <!-- 顶部悬浮栏 -->
    <div class="header">
      <button class="back-btn" id="backBtn">←</button>
      <div>
        <div class="brand-title" id="themeTitle">梦幻小屋</div>
        <div class="brand-sub" id="themeSubtitle">点击右侧家具进行替换</div>
      </div>
    </div>

    <div class="coins" id="coins">💰 <span>0</span></div>

    <!-- 移动端面板开关 -->
    <button class="panel-toggle" id="panelToggle">🛋</button>

    <!-- 右侧悬浮面板 -->
    <div class="panel" id="panel">
      <div class="panel-header">家具选择</div>
      <div class="tabs" id="tabs"></div>
      <div class="panel-body" id="panelBody"></div>
      <button class="finish-btn" id="finishBtn">完成设计</button>
    </div>

    <!-- 完成弹窗 -->
    <div class="modal" id="modal">
      <div class="modal-card">
        <div class="modal-icon">✨</div>
        <div class="modal-title" id="modalTitle">设计完成！</div>
        <div class="modal-text" id="modalText">你的搭配非常和谐</div>
        <div class="modal-coins" id="modalCoins">+100 💰</div>
        <button class="modal-btn" id="modalBtn">继续设计</button>
      </div>
    </div>
  </div>

  <script>
    const $ = id => document.getElementById(id);

    const THEMES = {
      girly:   { name: '少女心主题', desc: '粉色公主风 · 水晶吊灯', bg: 'images/room_girly.png' },
      natural: { name: '自然风主题', desc: '原木绿植 · 森林窗景', bg: 'images/room_natural.png' },
      island:  { name: '海岛大平层', desc: '海景落地窗 · 白色大理石', bg: 'images/room_island.png' },
      garden:  { name: '带花园小屋', desc: '法式花园 · 木质小屋', bg: 'images/room_garden.png' }
    };

    const CATEGORIES = [
      { id: 'sofa', name: '沙发', items: [
        { id: 'sofa_1', name: '深蓝现代', tag: '简约' },
        { id: 'sofa_2', name: '米白布艺', tag: '温馨' },
        { id: 'sofa_3', name: '焦糖皮质', tag: '复古' }
      ]},
      { id: 'rug', name: '地毯', items: [
        { id: 'rug_1', name: '波斯纹地毯', tag: '经典' },
        { id: 'rug_2', name: '羊毛素色', tag: '极简' },
        { id: 'rug_3', name: '几何图案', tag: '现代' }
      ]},
      { id: 'chair', name: '单人椅', items: [
        { id: 'chair_1', name: '灰色休闲椅', tag: '舒适' },
        { id: 'chair_2', name: '棕色皮椅', tag: '轻奢' },
        { id: 'chair_3', name: '藤编椅', tag: '自然' }
      ]}
    ];

    let state = {
      theme: localStorage.getItem('roomDesignTheme') || '',
      coins: parseInt(localStorage.getItem('roomDesignCoins') || '0', 10),
      selected: JSON.parse(localStorage.getItem('roomDesignSelected') || '{}')
    };

    let activeTab = 'sofa';

    function renderThemeScreen() {
      $('themeGrid').innerHTML = Object.entries(THEMES).map(([key, t]) => `
        <div class="theme-card" data-theme="${key}">
          <img src="${t.bg}" alt="${t.name}">
          <div class="overlay">
            <div class="title">${t.name}</div>
            <div class="desc">${t.desc}</div>
          </div>
        </div>
      `).join('');

      document.querySelectorAll('.theme-card').forEach(card => {
        card.addEventListener('click', () => {
          loadTheme(card.dataset.theme);
          $('themeScreen').classList.add('hidden');
        });
      });
    }

    function loadTheme(themeKey) {
      state.theme = themeKey;
      const t = THEMES[themeKey];
      $('roomBg').style.backgroundImage = `url('${t.bg}')`;
      $('themeTitle').textContent = t.name;
      $('themeSubtitle').textContent = t.desc;
      $('stage').className = `stage theme-${themeKey}`;
      renderTabs();
      renderOptions();
      updateAllLayers();
      saveState();
    }

    function renderTabs() {
      const sel = state.selected[state.theme] || {};
      $('tabs').innerHTML = CATEGORIES.map(cat => `
        <button class="tab ${cat.id === activeTab ? 'active' : ''}" data-tab="${cat.id}">
          ${cat.name}${sel[cat.id] ? ' ●' : ''}
        </button>
      `).join('');

      document.querySelectorAll('.tab').forEach(btn => {
        btn.addEventListener('click', () => {
          activeTab = btn.dataset.tab;
          renderTabs();
          renderOptions();
        });
      });
    }

    function renderOptions() {
      const cat = CATEGORIES.find(c => c.id === activeTab);
      const selected = (state.selected[state.theme] || {})[cat.id] || '';

      $('panelBody').innerHTML = `
        <div class="category active">
          <div class="category-title">选择${cat.name}款式</div>
          <div class="options">
            ${cat.items.map(item => `
              <div class="option ${item.id === selected ? 'selected' : ''}" data-item="${item.id}">
                <div class="option-thumb"><img src="images/${item.id}.png" alt="${item.name}"></div>
                <div class="option-name">${item.name}</div>
                <div class="option-tag">${item.tag}</div>
              </div>
            `).join('')}
          </div>
        </div>
      `;

      document.querySelectorAll('.option').forEach(opt => {
        opt.addEventListener('click', () => {
          if (!state.selected[state.theme]) state.selected[state.theme] = {};
          state.selected[state.theme][cat.id] = opt.dataset.item;
          renderTabs();
          renderOptions();
          updateLayer(cat.id);
          saveState();
        });
      });
    }

    function updateLayer(catId) {
      const el = $(`layer-${catId}`);
      const itemId = (state.selected[state.theme] || {})[catId];
      if (itemId) {
        el.innerHTML = `<img src="images/${itemId}.png" alt="">`;
        el.classList.add('active');
      } else {
        el.innerHTML = '';
        el.classList.remove('active');
      }
    }

    function updateAllLayers() {
      CATEGORIES.forEach(cat => updateLayer(cat.id));
    }

    function saveState() {
      localStorage.setItem('roomDesignTheme', state.theme);
      localStorage.setItem('roomDesignCoins', state.coins);
      localStorage.setItem('roomDesignSelected', JSON.stringify(state.selected));
    }

    function scoreDesign() {
      const sel = state.selected[state.theme] || {};
      const count = Object.keys(sel).length;
      if (count === 0) return { score: 0, text: '还没有选择任何家具哦' };
      const combo = CATEGORIES.every(cat => sel[cat.id]);
      const base = count * 30;
      const bonus = combo ? 40 : 0;
      return { score: base + bonus, text: combo ? '搭配完整，风格和谐统一！' : '基础搭配不错，可以继续完善' };
    }

    $('backBtn').addEventListener('click', () => {
      $('themeScreen').classList.remove('hidden');
      $('panel').classList.remove('open');
    });

    $('panelToggle').addEventListener('click', () => {
      $('panel').classList.toggle('open');
    });

    $('finishBtn').addEventListener('click', () => {
      const result = scoreDesign();
      const reward = result.score;
      state.coins += reward;
      saveState();
      $('modalCoins').textContent = `+${reward} 💰`;
      $('modalText').textContent = result.text;
      $('modal').classList.add('show');
      $('coins').innerHTML = `💰 <span>${state.coins}</span>`;
    });

    $('modalBtn').addEventListener('click', () => $('modal').classList.remove('show'));
    $('modal').addEventListener('click', e => { if (e.target === $('modal')) $('modal').classList.remove('show'); });

    // 初始化
    $('coins').innerHTML = `💰 <span>${state.coins}</span>`;
    renderThemeScreen();

    if (state.theme && THEMES[state.theme]) {
      loadTheme(state.theme);
      $('themeScreen').classList.add('hidden');
    } else {
      state.theme = 'girly';
      // 主题选择屏默认显示
    }
  </script>
</body>
</html>

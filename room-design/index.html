<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>梦幻小屋设计 Pro</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { width: 100%; height: 100%; overflow: hidden; }
  body {
    font-family: "PingFang SC", "Microsoft YaHei", -apple-system, sans-serif;
    color: #2a1f17;
    background: #0a0a0a;
    user-select: none;
    -webkit-user-select: none;
    touch-action: none;
  }

  /* ========== 全屏房间舞台 ========== */
  .stage {
    position: fixed;
    inset: 0;
    overflow: hidden;
    background: #000;
  }
  .room-bg {
    position: absolute;
    inset: 0;
    background-size: cover;
    background-position: center center;
    background-repeat: no-repeat;
    background-color: #1a1410;
    transition: opacity 0.4s ease;
  }
  .room-bg.theme-girly   { background-image: url('images/room_girly.png'); }
  .room-bg.theme-natural { background-image: url('images/room_natural.png'); }
  .room-bg.theme-island  { background-image: url('images/room_island.png'); }
  .room-bg.theme-garden  { background-image: url('images/room_garden.png'); }
  .room-bg.theme-modern  { background-image: url('images/room_modern.jpg'); }
  .room-bg.theme-kitchen { background-image: url('images/room_kitchen.jpg'); }

  .items-layer {
    position: absolute;
    inset: 0;
    pointer-events: none;
  }

  /* ========== 家具项 ========== */
  .f-item {
    position: absolute;
    pointer-events: auto;
    transform-origin: center bottom;
    transition: filter 0.2s ease;
    cursor: move;
    will-change: transform, left, bottom, width, height;
  }
  .f-item img {
    width: 100%;
    height: 100%;
    object-fit: contain;
    object-position: center bottom;
    display: block;
    user-select: none;
    -webkit-user-drag: none;
    pointer-events: none;
    filter: drop-shadow(0 14px 22px rgba(20, 12, 6, 0.32));
  }
  .f-item.selected {
    outline: 2px dashed rgba(201, 164, 106, 0.95);
    outline-offset: 2px;
  }
  .f-item.dragging {
    cursor: grabbing;
    transition: none;
  }
  .f-item.dragging img {
    filter: drop-shadow(0 22px 32px rgba(20, 12, 6, 0.45)) brightness(1.04);
  }

  /* 控制点 - 四角 */
  .handles {
    position: absolute;
    inset: 0;
    pointer-events: none;
    display: none;
  }
  .f-item.selected .handles { display: block; }
  .handle {
    position: absolute;
    width: 16px;
    height: 16px;
    background: #fff;
    border: 2.5px solid #c9a46a;
    border-radius: 50%;
    pointer-events: auto;
    box-shadow: 0 2px 6px rgba(0,0,0,0.4);
    z-index: 2;
  }
  .handle.nw { top: -8px; left: -8px; cursor: nwse-resize; }
  .handle.ne { top: -8px; right: -8px; cursor: nesw-resize; }
  .handle.sw { bottom: -8px; left: -8px; cursor: nesw-resize; }
  .handle.se { bottom: -8px; right: -8px; cursor: nwse-resize; }

  /* 选中后的浮动工具栏 */
  .floating-toolbar {
    position: absolute;
    left: 50%;
    top: -42px;
    transform: translateX(-50%);
    display: none;
    gap: 4px;
    background: rgba(42, 31, 23, 0.92);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    border: 1px solid rgba(201, 164, 106, 0.5);
    border-radius: 10px;
    padding: 4px;
    box-shadow: 0 6px 18px rgba(0,0,0,0.4);
    pointer-events: auto;
    z-index: 3;
    white-space: nowrap;
  }
  .f-item.selected .floating-toolbar { display: flex; }
  .floating-toolbar button {
    background: transparent;
    color: #fff;
    border: none;
    padding: 6px 10px;
    font-size: 12px;
    font-weight: 600;
    border-radius: 6px;
    cursor: pointer;
    transition: background 0.15s;
    display: flex;
    align-items: center;
    gap: 3px;
  }
  .floating-toolbar button:hover { background: rgba(201, 164, 106, 0.4); }
  .floating-toolbar .btn-del { color: #ff8e8e; }
  .floating-toolbar .btn-del:hover { background: rgba(255, 100, 100, 0.25); }

  /* ========== 顶部 Header ========== */
  .topbar {
    position: fixed;
    top: 16px;
    left: 16px;
    right: 16px;
    z-index: 50;
    display: flex;
    justify-content: space-between;
    align-items: center;
    pointer-events: none;
  }
  .logo {
    background: rgba(255, 255, 255, 0.85);
    backdrop-filter: blur(14px);
    -webkit-backdrop-filter: blur(14px);
    padding: 10px 20px;
    border-radius: 14px;
    font-weight: 700;
    font-size: 16px;
    color: #2a1f17;
    box-shadow: 0 6px 18px rgba(0,0,0,0.15);
    display: flex;
    align-items: center;
    gap: 8px;
    pointer-events: auto;
  }
  .topbar-right { display: flex; gap: 10px; pointer-events: auto; }
  .pill {
    background: rgba(255, 255, 255, 0.85);
    backdrop-filter: blur(14px);
    -webkit-backdrop-filter: blur(14px);
    padding: 10px 16px;
    border-radius: 14px;
    font-weight: 600;
    font-size: 14px;
    color: #2a1f17;
    box-shadow: 0 6px 18px rgba(0,0,0,0.15);
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .pill button {
    background: transparent;
    border: none;
    color: #c9a46a;
    font-weight: 700;
    cursor: pointer;
    font-size: 13px;
    padding: 0 4px;
  }
  .pill button:hover { color: #a07a3a; }

  /* ========== 底部提示条 ========== */
  .hint-bar {
    position: fixed;
    bottom: 16px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 40;
    background: rgba(42, 31, 23, 0.78);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    color: #fff;
    padding: 8px 18px;
    border-radius: 20px;
    font-size: 12px;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.3s;
  }
  .hint-bar.show { opacity: 1; }

  /* ========== 右侧悬浮面板 ========== */
  .side-panel {
    position: fixed;
    top: 80px;
    right: 16px;
    bottom: 16px;
    width: 320px;
    background: rgba(255, 255, 255, 0.86);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border-radius: 18px;
    box-shadow: 0 12px 40px rgba(0,0,0,0.25);
    display: flex;
    flex-direction: column;
    z-index: 30;
    overflow: hidden;
    border: 1px solid rgba(255, 255, 255, 0.4);
  }
  .panel-section {
    padding: 14px 16px;
    border-bottom: 1px solid rgba(0, 0, 0, 0.06);
  }
  .section-title {
    font-size: 11px;
    font-weight: 700;
    color: #8b7355;
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 10px;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  /* 主题选择 */
  .theme-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 6px;
  }
  .theme-btn {
    background: rgba(255, 255, 255, 0.7);
    border: 1.5px solid transparent;
    border-radius: 10px;
    padding: 8px 4px;
    cursor: pointer;
    text-align: center;
    transition: all 0.2s;
    font-size: 11px;
    font-weight: 600;
    color: #5a4a3a;
  }
  .theme-btn:hover { background: #fff; transform: translateY(-1px); }
  .theme-btn.active {
    border-color: #c9a46a;
    background: linear-gradient(135deg, #fffbf5, #fef7ed);
    color: #a07a3a;
  }
  .theme-emoji { font-size: 20px; display: block; margin-bottom: 2px; }

  /* 风格分类 tab */
  .style-tabs {
    display: flex;
    gap: 6px;
    margin-bottom: 10px;
    flex-wrap: wrap;
  }
  .style-tab {
    flex: 1;
    min-width: 80px;
    background: rgba(255, 255, 255, 0.6);
    border: 1px solid rgba(0, 0, 0, 0.06);
    border-radius: 8px;
    padding: 7px 4px;
    cursor: pointer;
    text-align: center;
    font-size: 12px;
    font-weight: 600;
    color: #6a5a4a;
    transition: all 0.2s;
  }
  .style-tab:hover { background: #fff; }
  .style-tab.active {
    background: #c9a46a;
    color: #fff;
    border-color: #c9a46a;
  }

  /* 家具列表 */
  .furniture-list {
    flex: 1;
    overflow-y: auto;
    padding: 4px 16px 16px;
    scrollbar-width: thin;
  }
  .furniture-list::-webkit-scrollbar { width: 6px; }
  .furniture-list::-webkit-scrollbar-thumb { background: rgba(201, 164, 106, 0.4); border-radius: 3px; }
  .furniture-list::-webkit-scrollbar-track { background: transparent; }

  .furniture-group { margin-bottom: 16px; }
  .group-title {
    font-size: 11px;
    font-weight: 700;
    color: #8b7355;
    margin-bottom: 8px;
    padding-left: 4px;
    display: flex;
    align-items: center;
    gap: 5px;
  }
  .group-title::before {
    content: '';
    width: 3px;
    height: 12px;
    background: #c9a46a;
    border-radius: 2px;
  }
  .item-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
  }
  .item-card {
    background: rgba(255, 255, 255, 0.7);
    border: 1.5px solid transparent;
    border-radius: 10px;
    padding: 6px;
    cursor: pointer;
    transition: all 0.2s;
    text-align: center;
  }
  .item-card:hover {
    background: #fff;
    border-color: #c9a46a;
    transform: translateY(-2px);
    box-shadow: 0 6px 14px rgba(201, 164, 106, 0.2);
  }
  .item-card img {
    width: 100%;
    height: 70px;
    object-fit: contain;
    display: block;
    margin-bottom: 4px;
  }
  .item-card .item-name {
    font-size: 11px;
    font-weight: 600;
    color: #5a4a3a;
  }

  /* 底部完成按钮 */
  .panel-footer {
    padding: 14px 16px;
    background: rgba(255, 255, 255, 0.4);
    border-top: 1px solid rgba(0, 0, 0, 0.06);
    display: flex;
    gap: 8px;
  }
  .btn-primary {
    flex: 1;
    background: linear-gradient(135deg, #c9a46a, #a07a3a);
    color: #fff;
    border: none;
    border-radius: 10px;
    padding: 12px;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
    box-shadow: 0 4px 12px rgba(201, 164, 106, 0.3);
  }
  .btn-primary:hover {
    transform: translateY(-1px);
    box-shadow: 0 6px 16px rgba(201, 164, 106, 0.4);
  }
  .btn-secondary {
    background: rgba(255, 255, 255, 0.8);
    color: #5a4a3a;
    border: 1px solid rgba(0, 0, 0, 0.1);
    border-radius: 10px;
    padding: 12px 16px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
  }
  .btn-secondary:hover { background: #fff; }

  /* 移动端 - 底部抽屉 */
  .panel-toggle {
    display: none;
    position: fixed;
    right: 16px;
    bottom: 16px;
    width: 56px;
    height: 56px;
    border-radius: 50%;
    background: linear-gradient(135deg, #c9a46a, #a07a3a);
    color: #fff;
    border: none;
    font-size: 24px;
    cursor: pointer;
    z-index: 60;
    box-shadow: 0 6px 20px rgba(0, 0, 0, 0.3);
  }

  @media (max-width: 768px) {
    .side-panel {
      top: auto;
      left: 0;
      right: 0;
      bottom: 0;
      width: 100%;
      max-height: 70vh;
      border-radius: 18px 18px 0 0;
      transform: translateY(calc(100% - 56px));
      transition: transform 0.3s ease;
    }
    .side-panel.open { transform: translateY(0); }
    .panel-toggle { display: block; }
    .floating-toolbar { top: 8px; bottom: auto; }
    .floating-toolbar button { padding: 4px 8px; font-size: 11px; }
  }

  /* 弹窗 */
  .modal {
    position: fixed;
    inset: 0;
    background: rgba(0, 0, 0, 0.6);
    backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 200;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s;
  }
  .modal.show { opacity: 1; pointer-events: auto; }
  .modal-card {
    background: #fff;
    border-radius: 18px;
    padding: 32px 28px;
    text-align: center;
    max-width: 360px;
    width: 90%;
    box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
    transform: scale(0.9);
    transition: transform 0.3s;
  }
  .modal.show .modal-card { transform: scale(1); }
  .modal-icon { font-size: 56px; margin-bottom: 12px; }
  .modal-title { font-size: 22px; font-weight: 700; color: #2a1f17; margin-bottom: 8px; }
  .modal-score { font-size: 32px; font-weight: 800; color: #c9a46a; margin: 12px 0; }
  .modal-desc { color: #6a5a4a; margin-bottom: 20px; font-size: 14px; line-height: 1.6; }
  .modal-actions { display: flex; gap: 10px; }
  .modal-actions button { flex: 1; padding: 12px; border-radius: 10px; border: none; font-weight: 700; cursor: pointer; font-size: 14px; }
  .modal-actions .btn-ok { background: linear-gradient(135deg, #c9a46a, #a07a3a); color: #fff; }
  .modal-actions .btn-cancel { background: #f0e8dd; color: #6a5a4a; }
</style>
</head>
<body>

<!-- 全屏舞台 -->
<div class="stage" id="stage">
  <div class="room-bg theme-girly" id="roomBg"></div>
  <div class="items-layer" id="itemsLayer"></div>
</div>

<!-- 顶部栏 -->
<div class="topbar">
  <div class="logo">🏠 梦幻小屋设计 Pro</div>
  <div class="topbar-right">
    <div class="pill">💰 <span id="coinCount">0</span> 金币</div>
    <div class="pill"><button id="resetBtn" title="清空所有家具">🔄 重置</button></div>
  </div>
</div>

<!-- 底部提示条 -->
<div class="hint-bar" id="hintBar">点击房间中家具可选中，按住可拖拽，拖拽控制点可缩放</div>

<!-- 右侧面板 -->
<div class="side-panel" id="sidePanel">
  <div class="panel-section">
    <div class="section-title">🏛️ 房间主题</div>
    <div class="theme-grid" id="themeGrid"></div>
  </div>

  <div class="panel-section">
    <div class="section-title">🎨 家具风格</div>
    <div class="style-tabs" id="styleTabs"></div>
  </div>

  <div class="furniture-list" id="furnitureList"></div>

  <div class="panel-footer">
    <button class="btn-secondary" id="clearBtn">清空</button>
    <button class="btn-primary" id="finishBtn">✓ 完成设计</button>
  </div>
</div>

<!-- 移动端面板切换按钮 -->
<button class="panel-toggle" id="panelToggle">🛋️</button>

<!-- 完成弹窗 -->
<div class="modal" id="modal">
  <div class="modal-card">
    <div class="modal-icon">🏆</div>
    <div class="modal-title">设计完成！</div>
    <div class="modal-score" id="modalScore">95 分</div>
    <div class="modal-desc" id="modalDesc">获得 50 金币奖励</div>
    <div class="modal-actions">
      <button class="btn-cancel" id="modalClose">继续调整</button>
      <button class="btn-ok" id="modalShare">✓ 已完成</button>
    </div>
  </div>
</div>

<script>
/* ============================================================
   梦幻小屋设计 Pro — 完整编辑器
   功能: 主题切换 / 拖拽 / 4 角缩放 / 滚轮缩放 / 层级调整 / 删除
   ============================================================ */

// ===== 配置数据 =====
const THEMES = [
  { id: 'girly',   name: '少女心', emoji: '🌸' },
  { id: 'natural', name: '自然风', emoji: '🌿' },
  { id: 'island',  name: '海岛大平层', emoji: '🏖️' },
  { id: 'garden',  name: '花园小屋', emoji: '🌷' },
  { id: 'modern',  name: '现代蓝调', emoji: '🛋️' },
  { id: 'kitchen', name: '法式厨房', emoji: '🍳' }
];

// 风格分类 + 家具
const STYLES = [
  {
    id: 'american', name: '美式复古', icon: '🤠',
    groups: [
      {
        title: '沙发',
        items: [
          { id: 'chesterfield', name: '切斯特菲尔德', src: 'images/chesterfield_sofa.png', w: 50, h: 28, draggable: true },
          { id: 'vintage_fabric', name: '复古布艺', src: 'images/vintage_fabric_sofa.png', w: 48, h: 30, draggable: true }
        ]
      },
      {
        title: '单人椅',
        items: [
          { id: 'barcelona', name: '巴塞罗那椅', src: 'images/barcelona_chair.png', w: 28, h: 36, draggable: true },
          { id: 'tiger', name: '老虎椅', src: 'images/tiger_chair.png', w: 30, h: 50, draggable: true }
        ]
      }
    ]
  },
  {
    id: 'french', name: '法式古典', icon: '👑',
    groups: [
      {
        title: '沙发',
        items: [
          { id: 'french_blue', name: '蓝色丝绒', src: 'images/french_sofa_blue.png', w: 52, h: 36, draggable: true },
          { id: 'french_gold', name: '金色丝绒', src: 'images/french_sofa_gold.png', w: 52, h: 38, draggable: true }
        ]
      },
      {
        title: '地毯',
        items: [
          { id: 'persian', name: '波斯挂毯', src: 'images/persian_rug.png', w: 56, h: 56, draggable: true }
        ]
      },
      {
        title: '其他',
        items: [
          { id: 'vanity', name: '雕花梳妆台', src: 'images/french_vanity.png', w: 36, h: 56, draggable: true }
        ]
      }
    ]
  },
  {
    id: 'modern', name: '现代简约', icon: '✨',
    groups: [
      {
        title: '沙发',
        items: [
          { id: 'sofa1', name: '深蓝现代', src: 'images/sofa_1.png', w: 48, h: 28, draggable: true },
          { id: 'sofa2', name: '米白布艺', src: 'images/sofa_2.png', w: 50, h: 32, draggable: true },
          { id: 'sofa3', name: '焦糖皮质', src: 'images/sofa_3.png', w: 48, h: 30, draggable: true }
        ]
      },
      {
        title: '地毯',
        items: [
          { id: 'rug1', name: '波斯纹毯', src: 'images/rug_1.png', w: 50, h: 40, draggable: true },
          { id: 'rug2', name: '羊毛素毯', src: 'images/rug_2.png', w: 52, h: 42, draggable: true },
          { id: 'rug3', name: '几何图案', src: 'images/rug_3.png', w: 50, h: 40, draggable: true }
        ]
      },
      {
        title: '单人椅',
        items: [
          { id: 'chair1', name: '灰色休闲', src: 'images/chair_1.png', w: 24, h: 32, draggable: true },
          { id: 'chair2', name: '棕色皮质', src: 'images/chair_2.png', w: 26, h: 38, draggable: true },
          { id: 'chair3', name: '藤编单椅', src: 'images/chair_3.png', w: 28, h: 40, draggable: true }
        ]
      }
    ]
  }
];

// ===== 状态 =====
const state = {
  theme: 'girly',
  style: 'american',
  items: [],   // {id, type, src, x, y, w, h, z, el}
  selectedId: null,
  coin: 0,
  zCounter: 1,
  isDragging: false,
  isResizing: false,
  dragOffset: { x: 0, y: 0 }
};

let nextId = 1;

// ===== DOM 引用 =====
const $ = (s) => document.querySelector(s);
const stage = $('#stage');
const roomBg = $('#roomBg');
const itemsLayer = $('#itemsLayer');
const themeGrid = $('#themeGrid');
const styleTabs = $('#styleTabs');
const furnitureList = $('#furnitureList');
const coinCount = $('#coinCount');
const hintBar = $('#hintBar');
const sidePanel = $('#sidePanel');
const panelToggle = $('#panelToggle');

// ===== 初始化 =====
function init() {
  loadState();
  renderThemes();
  renderStyleTabs();
  renderFurnitureList();
  applyTheme();
  renderExistingItems();
  bindEvents();
  showHint('点击右侧家具加入房间，拖拽自由摆放');
}

// 渲染主题
function renderThemes() {
  themeGrid.innerHTML = THEMES.map(t => `
    <div class="theme-btn ${state.theme === t.id ? 'active' : ''}" data-theme="${t.id}">
      <span class="theme-emoji">${t.emoji}</span>${t.name}
    </div>
  `).join('');
  themeGrid.querySelectorAll('.theme-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      state.theme = btn.dataset.theme;
      applyTheme();
      themeGrid.querySelectorAll('.theme-btn').forEach(b => b.classList.toggle('active', b.dataset.theme === state.theme));
      saveState();
    });
  });
}

function applyTheme() {
  roomBg.className = 'room-bg theme-' + state.theme;
}

// 渲染风格 tab
function renderStyleTabs() {
  styleTabs.innerHTML = STYLES.map(s => `
    <div class="style-tab ${state.style === s.id ? 'active' : ''}" data-style="${s.id}">
      ${s.icon} ${s.name}
    </div>
  `).join('');
  styleTabs.querySelectorAll('.style-tab').forEach(tab => {
    tab.addEventListener('click', () => {
      state.style = tab.dataset.style;
      styleTabs.querySelectorAll('.style-tab').forEach(t => t.classList.toggle('active', t.dataset.style === state.style));
      renderFurnitureList();
    });
  });
}

// 渲染家具列表
function renderFurnitureList() {
  const style = STYLES.find(s => s.id === state.style);
  furnitureList.innerHTML = style.groups.map(g => `
    <div class="furniture-group">
      <div class="group-title">${g.title}</div>
      <div class="item-grid">
        ${g.items.map(item => `
          <div class="item-card" data-item-id="${item.id}" data-style="${state.style}">
            <img src="${item.src}" alt="${item.name}" draggable="false" />
            <div class="item-name">${item.name}</div>
          </div>
        `).join('')}
      </div>
    </div>
  `).join('');
  furnitureList.querySelectorAll('.item-card').forEach(card => {
    card.addEventListener('click', () => {
      const itemId = card.dataset.itemId;
      const style = STYLES.find(s => s.id === card.dataset.style);
      const itemDef = findItemDef(style, itemId);
      if (itemDef) addItem(itemDef);
    });
  });
}

function findItemDef(style, itemId) {
  for (const g of style.groups) {
    const found = g.items.find(i => i.id === itemId);
    if (found) return found;
  }
  return null;
}

// ===== 添加家具 =====
function addItem(def) {
  const id = 'f' + (nextId++);
  const item = {
    id, type: def.id, src: def.src,
    x: 30 + Math.random() * 20,
    y: 25 + Math.random() * 10,
    w: def.w || 30,
    h: def.h || 30,
    z: ++state.zCounter
  };
  state.items.push(item);
  renderItem(item);
  selectItem(id);
  saveState();
  showHint('拖拽移动，拖角缩放');
}

function renderItem(item) {
  const el = document.createElement('div');
  el.className = 'f-item';
  el.id = 'item-' + item.id;
  el.style.left = item.x + '%';
  el.style.bottom = item.y + '%';
  el.style.width = item.w + '%';
  el.style.height = item.h + '%';
  el.style.zIndex = item.z;
  el.innerHTML = `
    <img src="${item.src}" alt="" draggable="false" />
    <div class="handles">
      <div class="handle nw" data-handle="nw"></div>
      <div class="handle ne" data-handle="ne"></div>
      <div class="handle sw" data-handle="sw"></div>
      <div class="handle se" data-handle="se"></div>
    </div>
    <div class="floating-toolbar">
      <button data-action="front" title="移至最前 (Z)">⬆ 置顶</button>
      <button data-action="back" title="移至最后 (X)">⬇ 置底</button>
      <button data-action="flip" title="水平翻转">⇄ 翻转</button>
      <button data-action="del" class="btn-del" title="删除 (Del)">✕ 删除</button>
    </div>
  `;
  itemsLayer.appendChild(el);
  item.el = el;
  bindItemEvents(item);
}

function renderExistingItems() {
  state.items.forEach(item => renderItem(item));
}

// ===== 事件绑定 =====
function bindEvents() {
  // 点击舞台空白处取消选中
  stage.addEventListener('mousedown', (e) => {
    if (e.target === stage || e.target === roomBg || e.target === itemsLayer) {
      deselectAll();
    }
  });

  // 重置
  $('#resetBtn').addEventListener('click', () => {
    if (state.items.length === 0) return;
    if (confirm('确定要清空所有家具吗？')) {
      clearAll();
    }
  });
  $('#clearBtn').addEventListener('click', () => {
    if (state.items.length === 0) return;
    if (confirm('确定要清空所有家具吗？')) {
      clearAll();
    }
  });

  // 完成设计
  $('#finishBtn').addEventListener('click', finishDesign);

  // 弹窗
  $('#modalClose').addEventListener('click', () => $('#modal').classList.remove('show'));
  $('#modalShare').addEventListener('click', () => {
    alert('设计已完成！金币已添加到账户。');
    $('#modal').classList.remove('show');
  });

  // 移动端面板切换
  panelToggle.addEventListener('click', () => {
    sidePanel.classList.toggle('open');
    panelToggle.textContent = sidePanel.classList.contains('open') ? '✕' : '🛋️';
  });

  // 键盘快捷键
  document.addEventListener('keydown', (e) => {
    if (!state.selectedId) return;
    const item = state.items.find(i => i.id === state.selectedId);
    if (!item) return;
    if (e.key === 'Delete' || e.key === 'Backspace') {
      e.preventDefault();
      removeItem(item);
    } else if (e.key === 'z' || e.key === 'Z') {
      e.preventDefault();
      bringToFront(item);
    } else if (e.key === 'x' || e.key === 'X') {
      e.preventDefault();
      sendToBack(item);
    } else if (e.key === 'Escape') {
      deselectAll();
    }
  });
}

// 家具项事件
function bindItemEvents(item) {
  const el = item.el;

  // 选中（点击非控制点/工具栏时）
  el.addEventListener('mousedown', (e) => {
    if (e.target.closest('.handle') || e.target.closest('.floating-toolbar')) return;
    e.stopPropagation();
    selectItem(item.id);
    startDrag(e, item);
  });

  // 触摸
  el.addEventListener('touchstart', (e) => {
    if (e.target.closest('.handle') || e.target.closest('.floating-toolbar')) return;
    e.stopPropagation();
    selectItem(item.id);
    startDrag(e.touches[0], item);
  }, { passive: true });

  // 滚轮缩放
  el.addEventListener('wheel', (e) => {
    if (state.selectedId !== item.id) return;
    e.preventDefault();
    e.stopPropagation();
    const delta = -Math.sign(e.deltaY) * 0.05;
    const newW = Math.max(8, Math.min(80, item.w * (1 + delta)));
    const ratio = newW / item.w;
    item.w = newW;
    item.h = Math.max(8, Math.min(80, item.h * ratio));
    applyItemSize(item);
    saveState();
  }, { passive: false });

  // 控制点 - 拖拽缩放
  el.querySelectorAll('.handle').forEach(h => {
    h.addEventListener('mousedown', (e) => {
      e.stopPropagation();
      e.preventDefault();
      startResize(e, item, h.dataset.handle);
    });
    h.addEventListener('touchstart', (e) => {
      e.stopPropagation();
      e.preventDefault();
      const t = e.touches[0];
      startResize(t, item, h.dataset.handle);
    }, { passive: false });
  });

  // 工具栏按钮
  el.querySelectorAll('.floating-toolbar button').forEach(btn => {
    btn.addEventListener('click', (e) => {
      e.stopPropagation();
      e.preventDefault();
      const action = btn.dataset.action;
      if (action === 'del') removeItem(item);
      else if (action === 'front') bringToFront(item);
      else if (action === 'back') sendToBack(item);
      else if (action === 'flip') {
        item.flipped = !item.flipped;
        el.querySelector('img').style.transform = item.flipped ? 'scaleX(-1)' : '';
        saveState();
      }
    });
  });
}

// 拖拽
function startDrag(e, item) {
  state.isDragging = true;
  item.el.classList.add('dragging');
  const stageRect = stage.getBoundingClientRect();
  const itemRect = item.el.getBoundingClientRect();
  state.dragOffset.x = e.clientX - itemRect.left;
  state.dragOffset.y = e.clientY - itemRect.top;

  function onMove(ev) {
    const cx = ev.touches ? ev.touches[0].clientX : ev.clientX;
    const cy = ev.touches ? ev.touches[0].clientY : ev.clientY;
    const left = cx - state.dragOffset.x - stageRect.left;
    const top = cy - state.dragOffset.y - stageRect.top;
    item.x = Math.max(0, Math.min(100 - item.w, (left / stageRect.width) * 100));
    item.y = Math.max(0, Math.min(100 - item.h, 100 - ((top + itemRect.height) / stageRect.height) * 100));
    item.el.style.left = item.x + '%';
    item.el.style.bottom = item.y + '%';
  }
  function onEnd() {
    state.isDragging = false;
    item.el.classList.remove('dragging');
    document.removeEventListener('mousemove', onMove);
    document.removeEventListener('mouseup', onEnd);
    document.removeEventListener('touchmove', onMove);
    document.removeEventListener('touchend', onEnd);
    saveState();
  }
  document.addEventListener('mousemove', onMove);
  document.addEventListener('mouseup', onEnd);
  document.addEventListener('touchmove', onMove, { passive: true });
  document.addEventListener('touchend', onEnd);
}

// 缩放
function startResize(e, item, corner) {
  state.isResizing = true;
  const stageRect = stage.getBoundingClientRect();
  const startX = e.clientX;
  const startY = e.clientY;
  const startW = item.w;
  const startH = item.h;
  const startXPos = item.x;
  const startYPos = item.y;

  function onMove(ev) {
    const cx = ev.touches ? ev.touches[0].clientX : ev.clientX;
    const cy = ev.touches ? ev.touches[0].clientY : ev.clientY;
    const dx = ((cx - startX) / stageRect.width) * 100;
    const dy = -((cy - startY) / stageRect.height) * 100;

    let newW = startW, newH = startH, newX = startXPos, newY = startYPos;

    if (corner === 'se') {
      newW = Math.max(8, Math.min(90, startW + dx));
      newH = Math.max(8, Math.min(80, startH + dy));
    } else if (corner === 'ne') {
      newW = Math.max(8, Math.min(90, startW + dx));
      newH = Math.max(8, Math.min(80, startH - dy));
      newY = Math.max(0, startYPos + dy);
    } else if (corner === 'sw') {
      newW = Math.max(8, Math.min(90, startW - dx));
      newH = Math.max(8, Math.min(80, startH + dy));
      newX = Math.max(0, startXPos + dx);
    } else if (corner === 'nw') {
      newW = Math.max(8, Math.min(90, startW - dx));
      newH = Math.max(8, Math.min(80, startH - dy));
      newX = Math.max(0, startXPos + dx);
      newY = Math.max(0, startYPos + dy);
    }

    item.w = newW;
    item.h = newH;
    item.x = newX;
    item.y = newY;
    applyItemSize(item);
  }

  function onEnd() {
    state.isResizing = false;
    document.removeEventListener('mousemove', onMove);
    document.removeEventListener('mouseup', onEnd);
    document.removeEventListener('touchmove', onMove);
    document.removeEventListener('touchend', onEnd);
    saveState();
  }
  document.addEventListener('mousemove', onMove);
  document.addEventListener('mouseup', onEnd);
  document.addEventListener('touchmove', onMove, { passive: true });
  document.addEventListener('touchend', onEnd);
}

function applyItemSize(item) {
  item.el.style.left = item.x + '%';
  item.el.style.bottom = item.y + '%';
  item.el.style.width = item.w + '%';
  item.el.style.height = item.h + '%';
}

// 选中
function selectItem(id) {
  if (state.selectedId && state.selectedId !== id) {
    const prev = state.items.find(i => i.id === state.selectedId);
    if (prev) prev.el.classList.remove('selected');
  }
  state.selectedId = id;
  const item = state.items.find(i => i.id === id);
  if (item) item.el.classList.add('selected');
  showHint('拖动家具移动，拖角缩放，Z/X 调层级，Del 删除');
}

function deselectAll() {
  state.items.forEach(i => i.el && i.el.classList.remove('selected'));
  state.selectedId = null;
}

function removeItem(item) {
  item.el.remove();
  state.items = state.items.filter(i => i.id !== item.id);
  state.selectedId = null;
  saveState();
}

function bringToFront(item) {
  state.zCounter++;
  item.z = state.zCounter;
  item.el.style.zIndex = item.z;
  saveState();
}

function sendToBack(item) {
  const minZ = Math.min(...state.items.map(i => i.z));
  item.z = minZ - 1;
  item.el.style.zIndex = item.z;
  saveState();
}

function clearAll() {
  state.items.forEach(i => i.el && i.el.remove());
  state.items = [];
  state.selectedId = null;
  state.zCounter = 1;
  saveState();
}

// 完成设计 - 评分
function finishDesign() {
  if (state.items.length === 0) {
    alert('请先添加一些家具再完成设计哦~');
    return;
  }
  const score = Math.min(100, 50 + state.items.length * 8);
  const reward = Math.floor(score / 2);
  state.coin += reward;
  $('#modalScore').textContent = score + ' 分';
  $('#modalDesc').textContent = `摆放 ${state.items.length} 件家具 · 获得 ${reward} 金币奖励`;
  $('#modal').classList.add('show');
  coinCount.textContent = state.coin;
  saveState();
}

let hintTimeout = null;
function showHint(msg) {
  hintBar.textContent = msg;
  hintBar.classList.add('show');
  clearTimeout(hintTimeout);
  hintTimeout = setTimeout(() => hintBar.classList.remove('show'), 3500);
}

// 持久化
function saveState() {
  const data = {
    theme: state.theme,
    style: state.style,
    coin: state.coin,
    zCounter: state.zCounter,
    items: state.items.map(i => ({ id: i.id, type: i.type, src: i.src, x: i.x, y: i.y, w: i.w, h: i.h, z: i.z, flipped: i.flipped || false }))
  };
  try {
    localStorage.setItem('dreamHomeDesign', JSON.stringify(data));
  } catch (e) {}
  state.items.forEach(i => {
    const numeric = parseInt(String(i.id).replace('f', ''), 10);
    if (!isNaN(numeric) && numeric >= nextId) nextId = numeric + 1;
  });
}

function loadState() {
  try {
    const raw = localStorage.getItem('dreamHomeDesign');
    if (!raw) return;
    const data = JSON.parse(raw);
    state.theme = data.theme || 'girly';
    state.style = data.style || 'american';
    state.coin = data.coin || 0;
    state.zCounter = data.zCounter || 1;
    state.items = data.items || [];
    nextId = state.items.reduce((m, i) => Math.max(m, parseInt(i.id.replace('f', ''), 10) || 0), 0) + 1;
    coinCount.textContent = state.coin;
  } catch (e) {}
}

// 启动
init();
</script>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>三丽鸥梦幻小屋 | Sanrio Dream House</title>
  <link href="https://fonts.googleapis.com/css2?family=ZCOOL+KuaiLe&family=Nunito:wght@400;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --wall: #d4e4c3;
      --wall-dark: #c2d6ae;
      --floor: #d9c9a8;
      --floor-shadow: #c4b390;
      --window-frame: #f8f0e0;
      --sky-day: #b8d4e3;
      --sea-day: #7bb8c9;
      --green-tree: #7da87b;
      --green-dark: #5d8a5b;
      --pink-soft: #f4c2c7;
      --pink-dark: #e8a6b0;
      --cream: #fff8e7;
      --white: #ffffff;
      --shadow: rgba(80, 90, 70, 0.15);
      --night-overlay: rgba(30, 40, 70, 0.45);
      --text: #5c6b55;
      --accent: #ff8fa3;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      font-family: "ZCOOL KuaiLe", "Nunito", "Microsoft YaHei", sans-serif;
      color: var(--text);
      background: #f0f4e8;
    }

    .scene {
      position: relative;
      width: 100vw; height: 100vh;
      background: linear-gradient(180deg, var(--wall) 0%, var(--wall-dark) 70%, var(--floor) 70%, var(--floor-shadow) 100%);
      overflow: hidden;
    }

    /* 地板纹理 */
    .floor {
      position: absolute; bottom: 0; left: 0; width: 100%; height: 30%;
      background:
        repeating-linear-gradient(90deg, transparent 0, transparent 49px, rgba(160,140,100,0.08) 50px),
        linear-gradient(180deg, var(--floor) 0%, var(--floor-shadow) 100%);
      transform-origin: bottom;
      transform: perspective(600px) rotateX(20deg) scale(1.15);
      z-index: 1;
    }

    /* 墙脚线 */
    .baseboard {
      position: absolute; bottom: 30%; left: 0; width: 100%; height: 12px;
      background: #e8dcc6; z-index: 2;
    }

    /* 大窗户 */
    .window {
      position: absolute;
      left: 50%; top: 10%; transform: translateX(-50%);
      width: 34%; height: 52%;
      background: var(--sky-day);
      border: 14px solid var(--window-frame);
      border-radius: 6px;
      box-shadow: inset 0 0 0 4px rgba(180,160,130,0.2), 0 10px 30px var(--shadow);
      overflow: hidden;
      z-index: 3;
      transition: background 1s ease;
    }
    .window::before, .window::after {
      content: ""; position: absolute; background: var(--window-frame); z-index: 5;
    }
    .window::before { width: 100%; height: 8px; top: 50%; left: 0; transform: translateY(-50%); }
    .window::after { width: 8px; height: 100%; top: 0; left: 50%; transform: translateX(-50%); }

    .sky {
      position: absolute; inset: 0; background: linear-gradient(180deg, var(--sky-day) 0%, #d4e8f0 60%, var(--sea-day) 60%, #6aa7b8 100%);
      transition: background 1s ease;
    }
    .cloud {
      position: absolute; background: var(--white); border-radius: 50px; opacity: 0.9;
      animation: floatCloud 30s linear infinite;
    }
    .cloud1 { width: 80px; height: 30px; top: 12%; left: -10%; }
    .cloud2 { width: 60px; height: 22px; top: 22%; left: -20%; animation-duration: 38s; animation-delay: -10s; }
    .cloud3 { width: 100px; height: 36px; top: 8%; left: -30%; animation-duration: 45s; animation-delay: -5s; }
    .cloud::before, .cloud::after {
      content: ""; position: absolute; background: var(--white); border-radius: 50%;
    }
    .cloud1::before { width: 40px; height: 40px; top: -18px; left: 12px; }
    .cloud1::after { width: 32px; height: 32px; top: -12px; right: 14px; }

    .distant-tree {
      position: absolute; bottom: 38%; left: -10%; width: 120%; height: 80px;
      background: var(--green-tree);
      border-radius: 50% 50% 0 0 / 30% 30% 0 0;
      opacity: 0.9;
    }
    .distant-tree::after {
      content: ""; position: absolute; right: -40%; bottom: 0; width: 80%; height: 100%;
      background: var(--green-dark); border-radius: 50% 50% 0 0 / 30% 30% 0 0;
      opacity: 0.6;
    }
    .bird {
      position: absolute; width: 14px; height: 8px; background: transparent;
      border-bottom: 2px solid rgba(255,255,255,0.8); border-radius: 0 0 50% 50%;
      animation: birdFly 12s linear infinite;
    }
    .bird:nth-child(1) { top: 18%; animation-delay: 0s; }
    .bird:nth-child(2) { top: 24%; animation-delay: -6s; }

    /* 窗帘 */
    .curtain {
      position: absolute; top: 8%; width: 11%; height: 56%; z-index: 4;
      background: linear-gradient(90deg, rgba(255,255,255,0.7) 0%, rgba(255,255,255,0.3) 100%);
      border-radius: 0 0 40% 40% / 0 0 10% 10%;
      box-shadow: 2px 4px 10px var(--shadow);
      animation: sway 6s ease-in-out infinite;
    }
    .curtain.left { left: 14%; transform-origin: top left; }
    .curtain.right { right: 14%; transform-origin: top right; animation-delay: -3s; }

    /* 阳台 / 窗台 */
    .balcony {
      position: absolute; left: 50%; bottom: 30%; transform: translateX(-50%);
      width: 40%; height: 18%;
      background: linear-gradient(180deg, #e8d9c0 0%, #d4c4a8 100%);
      border-radius: 4px 4px 0 0;
      z-index: 2;
      box-shadow: 0 -4px 0 rgba(180,160,130,0.3), 0 10px 20px var(--shadow);
    }
    .pot {
      position: absolute; bottom: 100%; width: 40px; height: 36px;
      background: #d88a7a; border-radius: 0 0 30% 30%;
      box-shadow: 0 4px 8px var(--shadow);
    }
    .pot::before {
      content: ""; position: absolute; top: -18px; left: 50%; transform: translateX(-50%);
      width: 50px; height: 30px; background: var(--green-tree); border-radius: 50%;
    }
    .pot::after {
      content: ""; position: absolute; top: -30px; left: 50%; transform: translateX(-50%);
      width: 18px; height: 18px; background: var(--pink-soft); border-radius: 50%;
      box-shadow: 12px 4px 0 var(--pink-dark), -8px 6px 0 var(--pink-soft);
    }
    .pot.left { left: 15%; }
    .pot.right { right: 15%; }

    /* 墙上装饰：左侧 */
    .wall-decor-left {
      position: absolute; left: 3%; top: 8%; width: 12%; height: 60%; z-index: 2;
      display: flex; flex-direction: column; gap: 12px; align-items: center;
    }
    .oval-frame {
      width: 60%; aspect-ratio: 3/4; background: var(--cream); border: 4px solid var(--pink-soft);
      border-radius: 50%; box-shadow: 0 4px 10px var(--shadow); position: relative; overflow: hidden;
    }
    .oval-frame::after {
      content: "🌸"; position: absolute; left: 50%; top: 50%; transform: translate(-50%, -50%);
      font-size: 1.4rem;
    }
    .hat {
      width: 70%; aspect-ratio: 1; background: var(--pink-soft); border-radius: 50% 50% 45% 45%;
      box-shadow: 0 4px 10px var(--shadow); position: relative;
    }
    .hat::after { content: "🎀"; position: absolute; left: 50%; top: 35%; transform: translateX(-50%); font-size: 1.2rem; }

    /* 书桌 */
    .desk {
      position: absolute; left: 8%; bottom: 32%; width: 22%; height: 28%; z-index: 6;
      background: #a8c6a0; border-radius: 4px 4px 0 0;
      box-shadow: 0 8px 20px var(--shadow);
    }
    .desk-top {
      position: absolute; top: 0; left: 0; width: 100%; height: 14px;
      background: #b8d4ae; border-radius: 4px 4px 0 0;
    }
    .desk-leg { position: absolute; bottom: 0; width: 12px; height: 100%; background: #8fb085; }
    .desk-leg.left { left: 8%; }
    .desk-leg.right { right: 8%; }
    .shelf-unit {
      position: absolute; right: 10%; bottom: 0; width: 40%; height: 75%; background: #9bb990;
      display: grid; grid-template-rows: repeat(3, 1fr); padding: 6px; gap: 4px; border-radius: 4px;
    }
    .shelf-row { background: #b8d4ae; border-radius: 2px; position: relative; }
    .book {
      position: absolute; bottom: 0; width: 8px; height: 80%; border-radius: 2px;
      box-shadow: 1px 0 2px rgba(0,0,0,0.1);
    }
    .book:nth-child(1) { left: 4px; background: #f4b8c4; }
    .book:nth-child(2) { left: 14px; background: #a8d4e6; height: 70%; }
    .book:nth-child(3) { left: 24px; background: #ffe6a8; height: 85%; }
    .book:nth-child(4) { left: 34px; background: #d4a5d9; height: 75%; }

    /* 兔子灯 */
    .bunny-lamp {
      position: absolute; left: 8%; top: -12%; width: 18%; z-index: 8;
      filter: drop-shadow(0 4px 6px var(--shadow));
      cursor: pointer; transition: transform 0.3s ease;
    }
    .bunny-lamp:hover { transform: scale(1.05); }
    .lamp-glow {
      position: absolute; left: -40%; top: -40%; width: 180%; height: 180%;
      background: radial-gradient(circle, rgba(255,245,180,0.6) 0%, transparent 70%);
      opacity: 0; transition: opacity 0.6s ease; pointer-events: none;
    }
    .bunny-lamp:hover .lamp-glow, .night .lamp-glow { opacity: 1; }

    /* 绿色沙发椅 */
    .sofa {
      position: absolute; left: 34%; bottom: 34%; width: 14%; height: 22%; z-index: 5;
      background: #9cc285; border-radius: 40% 40% 30% 30% / 20% 20% 10% 10%;
      box-shadow: 0 8px 20px var(--shadow);
    }
    .sofa::before {
      content: ""; position: absolute; top: -25%; left: 10%; width: 80%; height: 50%;
      background: #a8ce91; border-radius: 50% 50% 20% 20%;
    }
    .sofa::after {
      content: ""; position: absolute; top: 20%; left: 50%; transform: translateX(-50%);
      width: 50%; height: 40%; background: var(--cream); border-radius: 50%; opacity: 0.7;
      box-shadow: inset 0 0 0 4px rgba(140,180,120,0.3);
    }

    /* 地毯和睡觉小狗 */
    .rug {
      position: absolute; left: 50%; bottom: 30%; transform: translateX(-50%);
      width: 18%; height: 10%; background: var(--pink-soft); border-radius: 50%;
      z-index: 4; box-shadow: 0 6px 14px var(--shadow);
    }
    .sleeping-dog {
      position: absolute; left: 50%; top: 50%; transform: translate(-50%, -50%);
      width: 60%; z-index: 5; cursor: pointer; transition: transform 0.3s ease;
    }
    .sleeping-dog:hover { transform: translate(-50%, -50%) scale(1.08); }
    .zzz {
      position: absolute; right: -10%; top: -10%; font-size: 0.9rem; color: #88a;
      opacity: 0; animation: zzz 3s ease-in-out infinite;
    }
    .sleeping-dog:hover .zzz { opacity: 1; }

    /* 画架 */
    .easel {
      position: absolute; right: 8%; bottom: 30%; width: 16%; height: 50%; z-index: 6;
    }
    .easel-stand {
      position: absolute; left: 50%; bottom: 0; transform: translateX(-50%);
      width: 8px; height: 100%; background: #c9a87c; border-radius: 4px;
    }
    .easel-stand::before, .easel-stand::after {
      content: ""; position: absolute; top: 0; width: 6px; height: 95%; background: #c9a87c; border-radius: 4px; transform-origin: top center;
    }
    .easel-stand::before { left: -40px; transform: rotate(8deg); }
    .easel-stand::after { left: 40px; transform: rotate(-8deg); }
    .canvas {
      position: absolute; left: 50%; top: 18%; transform: translateX(-50%);
      width: 90%; height: 52%; background: var(--cream); border: 6px solid #c9a87c;
      border-radius: 4px; box-shadow: 0 4px 12px var(--shadow); overflow: hidden;
    }
    .canvas-art {
      position: absolute; inset: 8%;
      background: linear-gradient(180deg, #b8d4e3 50%, #7bb8c9 50%);
      border-radius: 4px;
    }
    .canvas-art::after {
      content: "☁️"; position: absolute; left: 20%; top: 20%; font-size: 1rem;
    }

    /* 画画的女孩 */
    .artist {
      position: absolute; right: 2%; bottom: 30%; width: 12%; height: 32%; z-index: 7;
      cursor: pointer; transition: transform 0.3s ease;
    }
    .artist:hover { transform: scale(1.03); }

    /* 画具小车 */
    .art-cart {
      position: absolute; right: 22%; bottom: 30%; width: 10%; height: 18%; z-index: 5;
      background: #a8c6a0; border-radius: 4px; box-shadow: 0 6px 14px var(--shadow);
    }
    .art-cart::before {
      content: ""; position: absolute; top: -8px; left: 8%; width: 84%; height: 8px; background: #9bb990; border-radius: 4px;
    }
    .paint-tube {
      position: absolute; bottom: 10%; width: 16%; height: 40%; border-radius: 30% 30% 4px 4px;
      transform: rotate(-15deg);
    }
    .paint-tube:nth-child(1) { left: 15%; background: #ff8fa3; }
    .paint-tube:nth-child(2) { left: 42%; background: #8fd3ff; transform: rotate(10deg); }
    .paint-tube:nth-child(3) { left: 68%; background: #ffe08a; transform: rotate(-5deg); }

    /* 捕梦网 */
    .dreamcatcher {
      position: absolute; left: 52%; top: 8%; width: 6%; z-index: 4;
      animation: swing 8s ease-in-out infinite; transform-origin: top center;
      cursor: pointer;
    }

    /* 日历 */
    .calendar {
      position: absolute; left: 50%; top: 5%; transform: translateX(-50%);
      width: 6%; aspect-ratio: 3/4; background: var(--cream); z-index: 4;
      border-radius: 4px; box-shadow: 0 4px 10px var(--shadow); padding: 4px; text-align: center;
      font-size: 0.6rem; color: #888; cursor: pointer; transition: transform 0.3s ease;
    }
    .calendar:hover { transform: translateX(-50%) rotate(-3deg); }
    .calendar strong { display: block; font-size: 1.2rem; color: var(--accent); margin-top: 4px; }

    /* 镜子 */
    .mirror {
      position: absolute; right: 3%; top: 18%; width: 10%; height: 22%; z-index: 4;
      background: linear-gradient(135deg, #d4e8f0 0%, #eef8fc 50%, #d4e8f0 100%);
      border: 6px solid #e8d9c0; border-radius: 50% 50% 0 0;
      box-shadow: 0 6px 14px var(--shadow); transform: rotate(3deg);
      overflow: hidden;
    }
    .mirror::after {
      content: ""; position: absolute; left: -20%; top: -20%; width: 60%; height: 100%;
      background: rgba(255,255,255,0.4); transform: rotate(25deg);
    }

    /* 漂浮的闪光粒子 */
    .sparkle {
      position: absolute; width: 6px; height: 6px; background: var(--white); border-radius: 50%;
      box-shadow: 0 0 8px var(--white); opacity: 0; animation: twinkle 4s ease-in-out infinite;
      z-index: 10; pointer-events: none;
    }

    /* 控制面板 */
    .controls {
      position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
      display: flex; gap: 12px; z-index: 100; padding: 10px 16px;
      background: rgba(255,255,255,0.85); border-radius: 999px; box-shadow: 0 6px 20px rgba(0,0,0,0.1);
      backdrop-filter: blur(6px);
    }
    .btn {
      border: none; padding: 8px 16px; border-radius: 999px; cursor: pointer;
      font-family: inherit; font-size: 0.9rem; background: var(--pink-soft); color: var(--text);
      transition: transform 0.2s, background 0.2s; box-shadow: 0 3px 0 var(--pink-dark);
    }
    .btn:active { transform: translateY(3px); box-shadow: none; }
    .btn:hover { background: #f8d4d9; }
    .btn.active { background: #b8d4ae; box-shadow: 0 3px 0 #8fb085; }

    /* 提示气泡 */
    .tooltip {
      position: absolute; padding: 8px 12px; background: var(--cream); color: var(--text);
      border-radius: 12px; font-size: 0.85rem; box-shadow: 0 4px 12px var(--shadow);
      pointer-events: none; opacity: 0; transform: translateY(10px) scale(0.95); transition: all 0.3s ease;
      z-index: 50; max-width: 180px; text-align: center;
    }
    .tooltip.show { opacity: 1; transform: translateY(0) scale(1); }
    .tooltip::after {
      content: ""; position: absolute; bottom: -8px; left: 50%; transform: translateX(-50%);
      border-width: 8px 8px 0; border-style: solid; border-color: var(--cream) transparent transparent;
    }

    /* 夜间模式 */
    .scene.night .window { background: #2a3a55; }
    .scene.night .sky { background: linear-gradient(180deg, #1e2b45 0%, #2a3d5c 60%, #22354d 60%, #1a2a3d 100%); }
    .scene.night .cloud { opacity: 0.3; }
    .scene.night .distant-tree { opacity: 0.5; }
    .scene.night::before {
      content: ""; position: absolute; inset: 0; background: var(--night-overlay);
      pointer-events: none; z-index: 20; transition: background 1s ease;
    }
    .scene.night .sparkle { background: #fff7a8; box-shadow: 0 0 10px #fff7a8; }
    .scene.night .lamp-glow { opacity: 1; }

    /* 动画定义 */
    @keyframes floatCloud { from { transform: translateX(0); } to { transform: translateX(420%); } }
    @keyframes sway { 0%, 100% { transform: rotate(0deg); } 50% { transform: rotate(1.5deg); } }
    @keyframes swing { 0%, 100% { transform: rotate(-2deg); } 50% { transform: rotate(2deg); } }
    @keyframes birdFly { 0% { left: -10%; opacity: 0; } 10% { opacity: 1; } 90% { opacity: 1; } 100% { left: 110%; opacity: 0; } }
    @keyframes zzz { 0% { transform: translateY(0) scale(0.8); opacity: 0; } 30% { opacity: 1; } 100% { transform: translateY(-20px) scale(1.2); opacity: 0; } }
    @keyframes twinkle { 0%, 100% { opacity: 0; transform: scale(0.5); } 50% { opacity: 0.9; transform: scale(1); } }

    /* 响应式 */
    @media (max-width: 768px) {
      .controls { bottom: 10px; transform: translateX(-50%) scale(0.9); }
      .calendar { font-size: 0.5rem; }
      .tooltip { font-size: 0.75rem; max-width: 140px; }
    }
  </style>
</head>
<body>
  <div class="scene" id="scene">
    <div class="floor"></div>
    <div class="baseboard"></div>

    <!-- 墙上装饰左侧 -->
    <div class="wall-decor-left">
      <div class="oval-frame" data-tip="墙上的小花装饰画"></div>
      <div class="hat" data-tip="美乐蒂的粉色帽子"></div>
      <div class="oval-frame" data-tip="三丽鸥朋友们的合影"></div>
      <div class="oval-frame" data-tip="窗边的绿叶"></div>
    </div>

    <!-- 窗户与窗外 -->
    <div class="curtain left"></div>
    <div class="curtain right"></div>
    <div class="window" id="window">
      <div class="sky">
        <div class="cloud cloud1"></div>
        <div class="cloud cloud2"></div>
        <div class="cloud cloud3"></div>
        <div class="distant-tree"></div>
        <div class="bird"></div>
        <div class="bird"></div>
      </div>
    </div>

    <!-- 阳台 -->
    <div class="balcony">
      <div class="pot left" data-tip="阳台上的小花"></div>
      <div class="pot right" data-tip="窗边的绿植"></div>
    </div>

    <!-- 日历 -->
    <div class="calendar" data-tip="今天是画画的好日子">
      <span>JUL</span><strong id="dayNum">17</strong>
    </div>

    <!-- 捕梦网 -->
    <div class="dreamcatcher" data-tip="捕梦网会带走噩梦">
      <svg viewBox="0 0 80 120" width="100%">
        <circle cx="40" cy="30" r="24" fill="none" stroke="#d4a5d9" stroke-width="3"/>
        <line x1="40" y1="6" x2="40" y2="0" stroke="#c9a87c" stroke-width="2"/>
        <line x1="40" y1="6" x2="18" y2="20" stroke="#d4a5d9" stroke-width="1"/>
        <line x1="40" y1="6" x2="62" y2="20" stroke="#d4a5d9" stroke-width="1"/>
        <line x1="18" y1="20" x2="62" y2="20" stroke="#d4a5d9" stroke-width="1"/>
        <line x1="18" y1="20" x2="40" y2="54" stroke="#d4a5d9" stroke-width="1"/>
        <line x1="62" y1="20" x2="40" y2="54" stroke="#d4a5d9" stroke-width="1"/>
        <line x1="40" y1="6" x2="40" y2="54" stroke="#d4a5d9" stroke-width="1"/>
        <path d="M40 54 Q30 70 25 85" stroke="#d4a5d9" stroke-width="2" fill="none"/>
        <path d="M40 54 Q50 70 55 85" stroke="#d4a5d9" stroke-width="2" fill="none"/>
        <path d="M40 54 Q40 70 40 90" stroke="#d4a5d9" stroke-width="2" fill="none"/>
        <circle cx="25" cy="88" r="4" fill="#f4b8c4"/>
        <circle cx="55" cy="88" r="4" fill="#f4b8c4"/>
        <circle cx="40" cy="93" r="4" fill="#a8d4e6"/>
      </svg>
    </div>

    <!-- 书桌 -->
    <div class="desk">
      <div class="desk-top"></div>
      <div class="desk-leg left"></div>
      <div class="desk-leg right"></div>
      <div class="shelf-unit">
        <div class="shelf-row"><div class="book"></div><div class="book"></div><div class="book"></div><div class="book"></div></div>
        <div class="shelf-row"><div class="book" style="background:#ffe08a;left:6px;height:70%"></div><div class="book" style="background:#a8d4e6;left:16px;height:85%"></div><div class="book" style="background:#f4b8c4;left:26px;height:75%"></div></div>
        <div class="shelf-row"><div class="book" style="background:#d4a5d9;left:8px;height:80%"></div><div class="book" style="background:#b8d4ae;left:18px;height:65%"></div></div>
      </div>
      <!-- 兔子灯 -->
      <div class="bunny-lamp" data-tip="美乐蒂兔子灯">
        <div class="lamp-glow"></div>
        <svg viewBox="0 0 100 120" width="100%">
          <ellipse cx="50" cy="95" rx="30" ry="10" fill="#f4c2c7"/>
          <ellipse cx="50" cy="85" rx="22" ry="18" fill="#fff0f3"/>
          <ellipse cx="50" cy="60" rx="28" ry="26" fill="#fff0f3"/>
          <ellipse cx="35" cy="30" rx="8" ry="22" fill="#fff0f3" transform="rotate(-15 35 30)"/>
          <ellipse cx="65" cy="30" rx="8" ry="22" fill="#fff0f3" transform="rotate(15 65 30)"/>
          <circle cx="40" cy="55" r="3" fill="#333"/>
          <circle cx="60" cy="55" r="3" fill="#333"/>
          <ellipse cx="50" cy="62" rx="4" ry="3" fill="#f4b8c4"/>
          <path d="M50 70 Q42 78 50 80 Q58 78 50 70" fill="#f4b8c4"/>

  </div>

  <div class="tooltip" id="tooltip"></div>

  <script>
    const scene = document.getElementById('scene');
    const windowEl = document.getElementById('window');
    const tooltip = document.getElementById('tooltip');
    const themeBtn = document.getElementById('themeBtn');
    const musicBtn = document.getElementById('musicBtn');
    const animBtn = document.getElementById('animBtn');

    // 昼夜切换
    themeBtn.addEventListener('click', () => {
      scene.classList.toggle('night');
      themeBtn.textContent = scene.classList.contains('night') ? '☀️ 白天模式' : '🌙 夜晚模式';
      themeBtn.classList.toggle('active', scene.classList.contains('night'));
    });

    // 暂停动画
    let animPaused = false;
    animBtn.addEventListener('click', () => {
      animPaused = !animPaused;
      document.body.style.setProperty('--play-state', animPaused ? 'paused' : 'running');
      const animated = document.querySelectorAll('.cloud, .curtain, .dreamcatcher, .bird, .sleeping-dog .zzz, .sparkle');
      animated.forEach(el => el.style.animationPlayState = animPaused ? 'paused' : 'running');
      animBtn.textContent = animPaused ? '▶️ 继续动画' : '✨ 暂停动画';
    });

    // 提示气泡
    document.querySelectorAll('[data-tip]').forEach(el => {
      el.addEventListener('mouseenter', e => {
        tooltip.textContent = el.dataset.tip;
        tooltip.classList.add('show');
        positionTooltip(el);
      });
      el.addEventListener('mouseleave', () => tooltip.classList.remove('show'));
      el.addEventListener('mousemove', () => positionTooltip(el));
    });
    function positionTooltip(el) {
      const rect = el.getBoundingClientRect();
      const tt = tooltip.getBoundingClientRect();
      let left = rect.left + rect.width/2 - tt.width/2;
      let top = rect.top - tt.height - 10;
      if (left < 10) left = 10; if (left + tt.width > window.innerWidth - 10) left = window.innerWidth - tt.width - 10;
      if (top < 10) top = rect.bottom + 10;
      tooltip.style.left = left + 'px'; tooltip.style.top = top + 'px';
    }

    // 鼠标视差
    document.addEventListener('mousemove', e => {
      const x = (e.clientX / window.innerWidth - 0.5) * 2;
      const y = (e.clientY / window.innerHeight - 0.5) * 2;
      windowEl.style.transform = `translateX(calc(-50% + ${x * 8}px)) translateY(${y * 4}px)`;
      document.querySelectorAll('.pot').forEach((pot, i) => {
        pot.style.transform = `translateX(${x * (i === 0 ? -3 : 3)}px) translateY(${y * 2}px)`;
      });
      document.querySelector('.distant-tree').style.transform = `translateX(${x * -6}px)`;
    });

    // 音乐按钮（简单模拟提示）
    let musicPlaying = false;
    musicBtn.addEventListener('click', () => {
      musicPlaying = !musicPlaying;
      musicBtn.textContent = musicPlaying ? '🔇 停止音乐' : '🎵 轻音乐';
      musicBtn.classList.toggle('active', musicPlaying);
      // 这里可接入真实音频文件，当前作为交互占位
      if (musicPlaying) {
        tooltip.textContent = '已开启舒缓音乐模式 🎶';
      } else {
        tooltip.textContent = '音乐已暂停';
      }
      tooltip.classList.add('show');
      setTimeout(() => tooltip.classList.remove('show'), 1800);
    });

    // 更新日历日期
    document.getElementById('dayNum').textContent = new Date().getDate();
  </script>
